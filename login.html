<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 登录</title>
<style>
:root{
  --bg:#fbf7f0;
  --surface:#fffdf8;
  --fg:#1f1a16;
  --fg-2:#4b4038;
  --muted:#7d7168;
  --accent:#9a5a2f;
  --accent-on:#ffffff;
  --accent-hover:color-mix(in oklab,var(--accent),black 8%);
  --accent-active:color-mix(in oklab,var(--accent),black 14%);
  --border:#ded3c5;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --focus-ring:0 0 0 4px color-mix(in oklab,var(--accent),transparent 76%);
  --motion-fast:200ms;
  --ease-standard:cubic-bezier(.22,1,.36,1);
  --field-gap:30px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:#e9e2d8;
  color:var(--fg);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
.device{
  position:relative;
  width:390px;height:844px;
  background:var(--bg);
  border-radius:46px;
  box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;
  display:flex;flex-direction:column;
}
@media (max-width:430px){
  body{background:var(--bg);}
  .device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
}
.login{
  flex:1;
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 88px) 36px calc(env(safe-area-inset-bottom) + 36px);
  animation:arrive 1000ms var(--ease-standard) both;
}
@keyframes arrive{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.app-name{
  font-family:var(--font-display);
  font-weight:400;font-size:32px;
  letter-spacing:.22em;text-indent:.22em;
  text-align:center;
  color:var(--fg);
  margin-bottom:14px;
}
.app-en{
  text-align:center;
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:var(--muted);
  text-indent:.34em;
  margin-bottom:52px;
}
/* 与注册页 step-title 一致的引导句 */
.switch-title{
  text-align:center;
  font-family:var(--font-display);
  font-size:20px;letter-spacing:.04em;
  color:var(--fg);
  margin-bottom:28px;
}
/* 选中「作」竹绿，选中「食」印章红 */
.login.mode-zuo{--accent:#3f7a4e;}
.login.mode-shi{--accent:#b5392f;}
/* 作 / 食 —— 两枚印章，一盖一留白 */
.mode{
  display:flex;align-items:center;justify-content:center;
  gap:40px;
  margin-bottom:26px;
}
.glyph{
  width:74px;height:74px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);
  font-size:28px;line-height:1;
  background:transparent;
  border:1px solid color-mix(in oklab,var(--fg),transparent 84%);
  color:var(--muted);
  cursor:pointer;
  transition:color 520ms var(--ease-standard),
             border-color 520ms var(--ease-standard),
             background-color 520ms var(--ease-standard);
}
.glyph.active{
  color:var(--accent);
  border-color:var(--accent);
  background:color-mix(in oklab,var(--accent),transparent 90%);
}
.glyph:focus-visible{outline:none;box-shadow:var(--focus-ring);}
.mode-desc{
  text-align:center;
  font-family:var(--font-display);
  font-size:16px;
  letter-spacing:.04em;
  color:var(--muted);
  min-height:24px;
  margin-bottom:64px;
}
/* 表单 —— 仅下划线，无标签 */
.form{display:flex;flex-direction:column;gap:var(--field-gap);}
.field{position:relative;}
.field input{
  font-family:var(--font-body);
  font-size:18px;
  color:var(--fg);
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border);
  border-radius:0;
  padding:10px 2px;
  width:100%;
  transition:border-color var(--motion-fast) var(--ease-standard),
             box-shadow var(--motion-fast) var(--ease-standard);
}
.field input::placeholder{color:var(--muted);}
.field input:focus{
  outline:none;
  border-bottom-color:var(--accent);
  box-shadow:0 1px 0 0 var(--accent);
}
.code-row{display:flex;align-items:center;gap:14px;}
.code-row input{flex:1;}
.code-btn{
  flex:0 0 auto;
  font-family:var(--font-body);
  font-size:14px;
  color:var(--muted);
  background:none;border:none;
  white-space:nowrap;cursor:pointer;
  padding:4px 0;
  transition:color var(--motion-fast) var(--ease-standard);
}
.code-btn:not(:disabled):active{color:var(--accent);}
.code-btn:disabled{color:var(--border);cursor:not-allowed;}
.btn-primary{
  margin-top:14px;
  font-family:var(--font-body);
  font-size:17px;letter-spacing:.4em;text-indent:.4em;
  color:var(--accent-on);
  background:var(--accent);
  border:none;border-radius:8px;
  padding:16px;
  cursor:pointer;
  transition:background var(--motion-fast) var(--ease-standard),
             transform var(--motion-fast) var(--ease-standard);
}
.btn-primary:not(:disabled):hover{background:var(--accent-hover);}
.btn-primary:not(:disabled):active{background:var(--accent-active);transform:translateY(1px);}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
.reg{
  margin-top:auto;
  text-align:center;
  padding-top:28px;
  font-size:14px;
  color:var(--muted);
}
.reg a{
  color:var(--accent);
  text-decoration:none;
  border-bottom:1px solid color-mix(in oklab,var(--accent),transparent 55%);
  padding-bottom:1px;
}
.reg a:active{color:var(--accent-active);}
.toast{
  position:absolute;
  left:50%;bottom:calc(env(safe-area-inset-bottom) + 44px);
  transform:translate(-50%,12px);
  background:var(--fg);
  color:var(--bg);
  font-size:13px;
  padding:10px 18px;
  border-radius:9999px;
  opacity:0;pointer-events:none;
  transition:opacity var(--motion-fast) var(--ease-standard),
             transform var(--motion-fast) var(--ease-standard);
  z-index:10;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
  <div class="device">
    <main class="login mode-zuo" data-od-id="login-screen">
      <h1 class="app-name">一作一食</h1>
      <p class="app-en">solo chef · sole love</p>

      <p class="switch-title">你是掌勺的，还是被宠的？</p>

      <div class="mode" data-od-id="mode-switch" role="tablist" aria-label="身份切换">
        <button class="glyph active" id="segZuo" type="button" role="tab" aria-selected="true" data-mode="zuo">作</button>
        <button class="glyph" id="segShi" type="button" role="tab" aria-selected="false" data-mode="shi">食</button>
      </div>

      <p class="mode-desc" id="modeDesc" data-od-id="mode-desc">做饭给喜欢的人吃</p>

      <form class="form" id="loginForm" data-od-id="login-form" novalidate>
        <div class="field">
          <input id="phone" type="tel" inputmode="numeric" autocomplete="tel"
                 maxlength="11" placeholder="手机号">
        </div>
        <div class="field">
          <div class="code-row">
            <input id="code" type="tel" inputmode="numeric" autocomplete="one-time-code"
                   maxlength="6" placeholder="验证码">
            <button type="button" class="code-btn" id="codeBtn">获取验证码</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn" disabled>登 录</button>
      </form>

      <p class="reg" data-od-id="register-entry">还没有账号？<a href="register.html" id="regLink">注册</a></p>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>
  </div>
<script>
  (function () {
    var TEXT = {
      zuo: '做饭给喜欢的人吃',
      shi: '吃喜欢的人做的饭'
    };
    var segZuo = document.getElementById('segZuo');
    var segShi = document.getElementById('segShi');
    var modeDesc = document.getElementById('modeDesc');
    var phone = document.getElementById('phone');
    var code = document.getElementById('code');
    var codeBtn = document.getElementById('codeBtn');
    var loginBtn = document.getElementById('loginBtn');
    var form = document.getElementById('loginForm');
    var toast = document.getElementById('toast');
    var loginRoot = document.querySelector('.login');

    var current = 'zuo';

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(function () { toast.classList.remove('show'); }, 2000);
    }

    function setMode(mode) {
      if (!TEXT[mode]) return;
      current = mode;
      modeDesc.textContent = TEXT[mode];
      var zuoActive = mode === 'zuo';
      segZuo.classList.toggle('active', zuoActive);
      segShi.classList.toggle('active', !zuoActive);
      segZuo.setAttribute('aria-selected', String(zuoActive));
      segShi.setAttribute('aria-selected', String(!zuoActive));
      loginRoot.classList.remove('mode-zuo', 'mode-shi');
      loginRoot.classList.add('mode-' + mode);
      try { localStorage.setItem('yzys_mode', mode); } catch (e) {}
    }

    function validPhone(v) { return /^1\d{10}$/.test(v.trim()); }
    function refresh() {
      loginBtn.disabled = !(validPhone(phone.value) && code.value.trim().length >= 4);
      if (!validPhone(phone.value)) codeBtn.disabled = true;
      else if (!codeBtn.dataset.counting) codeBtn.disabled = false;
    }

    segZuo.addEventListener('click', function () { setMode('zuo'); });
    segShi.addEventListener('click', function () { setMode('shi'); });

    phone.addEventListener('input', function () { this.value = this.value.replace(/\D/g, ''); refresh(); });
    code.addEventListener('input', function () { this.value = this.value.replace(/\D/g, ''); refresh(); });

    codeBtn.addEventListener('click', function () {
      if (!validPhone(phone.value)) { showToast('请输入正确的手机号'); return; }
      var left = 60;
      codeBtn.dataset.counting = '1';
      codeBtn.disabled = true;
      codeBtn.textContent = left + 's';
      showToast('验证码已发送');
      var timer = setInterval(function () {
        left--;
        if (left <= 0) {
          clearInterval(timer);
          codeBtn.dataset.counting = '';
          codeBtn.textContent = '获取验证码';
          refresh();
        } else {
          codeBtn.textContent = left + 's';
        }
      }, 1000);
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (loginBtn.disabled) return;
      showToast('登录成功');
      try { localStorage.setItem('yzys_mode', current); } catch (err) {}
      setTimeout(function () {
        window.location.href = current === 'zuo' ? 'zuo_home.html' : 'login.html';
      }, 600);
    });

    try { var saved = localStorage.getItem('yzys_mode'); if (saved && TEXT[saved]) setMode(saved); } catch (e) {}
    refresh();
  })();
</script>
</body>
</html>
