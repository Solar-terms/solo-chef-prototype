<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;family=Source+Serif+Pro:wght@400;600&amp;display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 查看菜谱</title>
<style>
:root{
  --bg:#fbf7f0;--surface:#fffdf8;--fg:#1f1a16;--fg-2:#4b4038;
  --muted:#7d7168;--accent:#3f7a4e;
  --border:#ded3c5;--border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-sm:14px;--text-base:18px;--text-lg:21px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
  --motion-fast:180ms;--ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);border-radius:46px;
  box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media(max-width:430px){body{background:var(--bg);}.device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
}
.topbar a{text-decoration:none;display:flex;align-items:center;}
.topbar .back-btn{color:var(--fg);}
.topbar .back-btn:active{opacity:.5;}
.topbar .edit-link{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  color:var(--accent);border:1px solid var(--accent);border-radius:var(--radius-pill);
  padding:5px 14px;
}
.topbar .edit-link:active{opacity:.6;}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:var(--space-4) var(--space-6) var(--space-8);}

/* 头部 */
.vh{text-align:center;margin-bottom:var(--space-4);}
.vh .vh-icon{font-size:52px;}
.vh .vh-name{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.06em;margin-top:var(--space-2);}
.vh .vh-tags{display:flex;justify-content:center;gap:var(--space-2);margin-top:var(--space-2);}
.vh .vh-tag{font-family:var(--font-mono);font-size:10px;color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 90%);border-radius:var(--radius-pill);padding:2px 10px;}

/* 卡片 */
.card{
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);padding:var(--space-4);margin-bottom:var(--space-4);
}
.card-title{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;
  color:var(--accent);margin-bottom:var(--space-3);
}

/* 食材 */
.ing-row{display:flex;flex-wrap:wrap;gap:6px;}
.ing-item,.ing-tag{
  display:flex;align-items:center;gap:5px;
  background:color-mix(in oklab,var(--accent),transparent 93%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 80%);
  border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);
  font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);
}
.ing-item .ii-icon{font-size:16px;flex:0 0 auto;}
.ing-item .ii-amt{font-family:var(--font-mono);font-size:10px;color:var(--muted);}

/* 阶段 */
.phase-title{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;
  color:var(--accent);margin-bottom:var(--space-2);
}

/* 模块 */
.mod{
  background:color-mix(in oklab,var(--accent),transparent 95%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 86%);
  border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);margin-bottom:6px;
}
.mod .mod-t{font-family:var(--font-mono);font-size:9px;color:var(--accent);letter-spacing:.06em;margin-bottom:4px;}
.mod .mod-l{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.mod .ing-tag{margin:0;}

/* 条目 */
.entry{
  display:flex;gap:var(--space-3);padding:var(--space-2) 0;
  border-bottom:1px solid var(--border-soft);
}
.entry:last-child{border-bottom:none;}
.entry .ent-num{font-family:var(--font-mono);font-size:10px;color:var(--accent);font-weight:bold;flex:0 0 16px;text-align:right;padding-top:3px;}
.entry .ent-body{flex:1;}
.entry .ent-main{font-size:var(--text-sm);color:var(--fg);line-height:1.5;}
.entry .ent-note{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:1px;}

/* 链接 */
.link-row{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-body);font-size:var(--text-sm);color:var(--accent);
  text-decoration:none;padding:var(--space-2) 0;
}
.link-row:active{opacity:.6;}
.link-row .lr-icon{font-size:14px;}

/* 视频 */
.video-card{
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);margin-bottom:var(--space-4);overflow:hidden;
}
.video-card iframe{width:100%;height:220px;border:none;display:block;}
.video-card .vid-play{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:var(--space-6);font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--accent);text-decoration:none;background:color-mix(in oklab,var(--accent),transparent 95%);
}
.video-card .vid-play:active{opacity:.7;}

/* 空状态 */
.empty{text-align:center;padding:var(--space-8) 0;}
.empty .e-icon{font-size:40px;margin-bottom:var(--space-3);}
.empty p{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:var(--space-4);}
.empty a{display:inline-block;font-family:var(--font-mono);font-size:10px;color:var(--accent);text-decoration:none;border:1px solid var(--accent);border-radius:var(--radius-pill);padding:var(--space-1) var(--space-4);}
</style>
</head>
<body>
<div class="device">
  <header class="topbar">
    <a class="back-btn" href="recipe-manage.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <a class="edit-link" id="editLink" href="#">编辑</a>
  </header>
  <main class="main" id="main"></main>
</div>
<script>
(function(){
  /* ---- 食材表 ---- */
  var ingMap={};
  [{id:1,n:'大米',i:'🍚'},{id:3,n:'面条',i:'🍜'},{id:5,n:'牛肉',i:'🥩'},{id:8,n:'鸡蛋',i:'🥚'},{id:9,n:'鸡胸肉',i:'🍗'},{id:11,n:'虾仁',i:'🍤'},{id:12,n:'豆腐',i:'🧈'},{id:14,n:'番茄',i:'🍅'},{id:15,n:'黄瓜',i:'🥒'},{id:16,n:'番茄',i:'🍅'},{id:17,n:'菠菜',i:'🥬'},{id:18,n:'生菜',i:'🥬'},{id:19,n:'洋葱',i:'🧅'},{id:20,n:'土豆',i:'🥔'},{id:22,n:'西兰花',i:'🥦'},{id:25,n:'蘑菇',i:'🍄'},{id:28,n:'茄子',i:'🍆'},{id:30,n:'玉米',i:'🌽'},{id:32,n:'苹果',i:'🍎'},{id:34,n:'牛油果',i:'🥑'},{id:35,n:'蓝莓',i:'🫐'},{id:37,n:'橙子',i:'🍊'},{id:40,n:'核桃',i:'🥜'},{id:42,n:'生菜',i:'🥬'},{id:43,n:'牛奶',i:'🥛'},{id:44,n:'酸奶',i:'🥛'},{id:57,n:'盐',i:'🧂'},{id:59,n:'葱',i:'🧅'},{id:60,n:'姜',i:'🫚'},{id:61,n:'小白菜',i:'🥬'},{id:62,n:'蒜',i:'🧄'},{id:63,n:'食用油',i:'🫗'}].forEach(function(o){ingMap[o.id]={n:o.n,i:o.i};});
  function icon(id){var m=ingMap[id];return m?m.i:'📦';}
  function name(id){var m=ingMap[id];return m?m.n:'食材#'+id;}
  function esc(s){return String(s||'').replace(/</g,'&lt;');}
  /* 从食材列表中查用量 */
  var ingIdFromName={};
  Object.keys(ingMap).forEach(function(k){ingIdFromName[ingMap[k].n]=+k;});
  function ingTag(id){
    var n=name(id);var i=icon(id);
    var ings=r.ingredients||[];
    var found=ings.find(function(x){return x.ingredientId===id;});
    var amt=found&&found.amount?found.amount:'';
    return '<span class="ing-tag">'+i+' '+esc(n)+(amt?' '+amt:'')+'</span>';
  }
  function ingTagByName(s){
    var id=ingIdFromName[s];
    if(id) return ingTag(id);
    return '<span class="ing-tag">'+esc(s)+'</span>';
  }

  /* ---- MOCK ---- */
  var recipes=[];
  try{recipes=JSON.parse(localStorage.getItem('yzys_recipes')||'[]');}catch(e){}
  if(!recipes.length){
    recipes=[
      {id:1,name:'番茄炒蛋',icon:'🍳',time:'约10分钟',difficulty:'容易做',source:'懒饭',sourceUrl:'',video:'',ingredients:[{ingredientId:8,amount:'3 个'},{ingredientId:16,amount:'2 个'},{ingredientId:57,amount:'适量'}],steps:[{phase:'配菜',entries:[{ingredientId:8,action:'',note:'打散加少许盐'},{ingredientId:16,action:'切块',note:''}]},{phase:'炒制',entries:[{ingredientId:8,action:'炒制',heat:'中火',note:'盛出备用'},{ingredientId:16,action:'炒制',heat:'中火',note:'炒至出汁'},{ingredientId:null,action:'调味',heat:'大火',note:'加入鸡蛋翻炒均匀'}],modules:[{type:'starter',data:{oil:'食用油',heat:'中火',aromatics:[]}},{type:'main',data:{heat:'大火',ingredientId:[16]}},{type:'stir',data:{heat:'大火快炒',duration:'—',degree:'—'}},{type:'season',data:{seasonings:['盐适量']}},{type:'finish',data:{heat:'直接出锅',garnish:[]}}]}]},
      {id:2,name:'鸡胸肉沙拉',icon:'🥗',time:'约15分钟',difficulty:'容易做',source:'懒饭',sourceUrl:'',video:'',ingredients:[{ingredientId:9,amount:'1 块'},{ingredientId:15,amount:'半根'},{ingredientId:16,amount:'1 个'},{ingredientId:42,amount:'适量'}],steps:[{phase:'配菜',entries:[{ingredientId:9,action:'',note:'煮熟撕成丝'},{ingredientId:15,action:'切丁',note:''},{ingredientId:16,action:'切块',note:''},{ingredientId:42,action:'洗净',note:'撕碎'},{ingredientId:null,action:'调味',note:'淋上油醋汁'}]}]},
      {id:3,name:'葱花蛋汤',icon:'🫕',time:'约10分钟',difficulty:'容易做',source:'懒饭',sourceUrl:'',video:'',ingredients:[{ingredientId:8,amount:'2 个'},{ingredientId:59,amount:'适量'},{ingredientId:57,amount:'适量'}],steps:[{phase:'配菜',entries:[{ingredientId:8,action:'',note:'打散备用'},{ingredientId:59,action:'切末',note:'切葱花'}]},{phase:'炖煮',entries:[{ingredientId:null,action:'炖煮',heat:'中火',note:'水烧开放入一半葱花'},{ingredientId:8,action:'炖煮',heat:'小火',note:'淋入蛋液搅拌'},{ingredientId:null,action:'调味',note:'撒剩余葱花和盐出锅'}]}]},
      {id:4,name:'清炒小白菜',icon:'🥬',time:'约10-15分钟',difficulty:'容易做',source:'懒饭',sourceUrl:'https://lanfanapp.com/recipe/2201/',video:'',ingredients:[{ingredientId:61,amount:'300g'},{ingredientId:62,amount:'15g'},{ingredientId:63,amount:'20g'},{ingredientId:57,amount:'2g'}],steps:[{phase:'配菜',entries:[{ingredientId:61,action:'切段',note:'去掉根部，洗净沥干'},{ingredientId:62,action:'拍碎',note:'切蒜末'}]},{phase:'炒制',entries:[{ingredientId:63,action:'炒制',heat:'中火',note:'加热至六成热，下蒜末爆香'},{ingredientId:61,action:'炒制',heat:'大火',note:'快速翻炒至叶片变软'},{ingredientId:null,action:'加盐',heat:'中火',note:'炒匀出锅装盘'}],modules:[{type:'starter',data:{oil:'食用油',heat:'中火',aromatics:['蒜15g']}},{type:'main',data:{heat:'大火',ingredientId:[61]}},{type:'stir',data:{heat:'大火快炒',duration:'1分钟',degree:'断生'}},{type:'season',data:{seasonings:['盐2g']}},{type:'finish',data:{heat:'直接出锅',garnish:[]}}]}]}
    ];
    try{localStorage.setItem('yzys_recipes',JSON.stringify(recipes));}catch(e){}
    location.reload();
  }

  /* ---- ROUTE ---- */
  var q=new URLSearchParams(location.search),id=+q.get('id');
  if(!id){var ids=[];try{ids=JSON.parse(localStorage.getItem('yzys_recipes')||'[]').map(function(r){return r.id;}).filter(Boolean);}catch(e){}if(ids.length){location.replace('recipe-view.html?id='+ids[0]);return;}document.getElementById('main').innerHTML='<div class="empty"><div class="e-icon">📭</div><p>暂无菜谱</p><a href="recipe-manage.html">前往菜谱管理</a></div>';return;}
  var r=recipes.find(function(x){return x.id===id;});
  if(!r){document.getElementById('main').innerHTML='<div class="empty"><div class="e-icon">🔍</div><p>菜谱不存在或已删除</p><a href="recipe-manage.html">返回菜谱管理</a></div>';return;}
  document.getElementById('editLink').href='recipe-edit.html?id='+r.id;

  var h='';
  /* HEADER */
  h+='<div class="vh"><div class="vh-icon">'+r.icon+'</div><div class="vh-name">'+esc(r.name)+'</div><div class="vh-tags">';
  if(r.time) h+='<span class="vh-tag">⏱ '+esc(r.time)+'</span>';
  if(r.difficulty) h+='<span class="vh-tag">💪 '+esc(r.difficulty)+'</span>';
  h+='</div></div>';

  /* VIDEO */
  if(r.video){
    h+='<div class="video-card">';
    var bvid=r.video.match(/BV\w+/);
    if(bvid) h+='<iframe src="//player.bilibili.com/player.html?bvid='+bvid[0]+'&high_quality=1" scrolling="no" frameborder="0" allowfullscreen></iframe>';
    else h+='<a class="vid-play" href="'+esc(r.video)+'" target="_blank">▶ 点击播放视频教程</a>';
    h+='</div>';
  }

  /* 食材 */
  if(r.ingredients&&r.ingredients.length){
    h+='<div class="card"><div class="card-title">食材</div><div class="ing-row">';
    r.ingredients.forEach(function(x){h+='<div class="ing-item"><span class="ii-icon">'+icon(x.ingredientId)+'</span><span class="ii-name">'+esc(name(x.ingredientId))+'</span><span class="ii-amt">'+esc(x.amount)+'</span></div>';});
    h+='</div></div>';
  }

  /* STEPS */
  if(r.steps&&r.steps.length){
    var hasPhase=r.steps[0]&&r.steps[0].phase!==undefined;
    if(hasPhase){
      r.steps.forEach(function(ph){
        h+='<div class="card"><div class="phase-title">'+esc(ph.phase)+'</div>';
        /* modules */
        if(ph.modules&&ph.modules.length){
          ph.modules.forEach(function(mod){
            if(!mod||!mod.data) return;
            var d=mod.data;
            if(mod.type==='starter'){h+='<div class="mod"><div class="mod-t">起锅</div><div class="mod-l">';if(d.oil) h+=ingTagByName(d.oil);if(d.heat) h+='<span class="ing-tag">'+esc(d.heat)+'</span>';if(d.aromatics&&d.aromatics.length) h+='<span class="ing-tag">爆香：'+d.aromatics.map(esc).join('、')+'</span>';h+='</div></div>';}
            if(mod.type==='main'){h+='<div class="mod"><div class="mod-t">下主料</div><div class="mod-l">';if(d.heat) h+='<span class="ing-tag">'+esc(d.heat)+'</span>';if(d.ingredientId&&d.ingredientId.length) d.ingredientId.forEach(function(mid){h+=ingTag(mid);});h+='</div></div>';}
            if(mod.type==='stir'&&d.heat){h+='<div class="mod"><div class="mod-t">翻炒</div><div class="mod-l"><span class="ing-tag">'+esc(d.heat)+'</span>';if(d.duration&&d.duration!=='—') h+=' <span class="ing-tag">'+esc(d.duration)+'</span>';if(d.degree&&d.degree!=='—') h+=' <span class="ing-tag">'+esc(d.degree)+'</span>';h+='</div></div>';}
            if(mod.type==='season'&&d.seasonings&&d.seasonings.length){h+='<div class="mod"><div class="mod-t">调味</div><div class="mod-l">'+d.seasonings.map(function(s){return'<span class="ing-tag">'+esc(s)+'</span>';}).join(' ')+'</div></div>';}
            if(mod.type==='finish'){h+='<div class="mod"><div class="mod-t">出锅</div><div class="mod-l">';if(d.heat) h+='<span class="ing-tag">'+esc(d.heat)+'</span> ';if(d.garnish&&d.garnish.length) h+='<span class="ing-tag">点缀：'+d.garnish.map(esc).join('、')+'</span>';h+='</div></div>';}
          });
        }
        /* entries */
        if((!ph.modules||!ph.modules.length)&&ph.entries&&ph.entries.length){
          ph.entries.forEach(function(e,i){
            h+='<div class="entry"><span class="ent-num">'+(i+1)+'</span><div class="ent-body"><div class="ent-main">';
            if(e.ingredientId) h+='<span class="ing-tag">'+icon(e.ingredientId)+' '+esc(name(e.ingredientId))+'</span>';
            if(e.action) h+='<span class="ing-tag">'+esc(e.action)+'</span>';
            if(e.heat&&ph.phase!=='配菜'&&e.heat!=='不加热') h+=' <span class="ent-tag">'+esc(e.heat)+'</span>';
            h+='</div>';
            if(e.note) h+='<div class="ent-note">'+esc(e.note)+'</div>';
            h+='</div></div>';
          });
        }
        h+='</div>';
      });
    }
  }

  /* SOURCE */
  if(r.sourceUrl) h+='<a class="card link-row" href="'+esc(r.sourceUrl)+'" target="_blank"><span class="lr-icon">📎</span> '+esc(r.sourceUrl)+'</a>';
  else if(r.source) h+='<div class="card" style="text-align:center;font-size:10px;color:var(--muted);font-family:var(--font-mono);">来源：'+esc(r.source)+'</div>';

  document.getElementById('main').innerHTML=h;
})();
</script>
</body>
</html>
