<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;family=Source+Serif+Pro:wght@400;600&amp;display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 添加库存</title>
<style>
:root{
  --bg:#fbf7f0;--surface:#fffdf8;--fg:#1f1a16;--fg-2:#4b4038;
  --muted:#7d7168;--accent:#3f7a4e;
  --border:#ded3c5;--border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-sm:14px;--text-base:18px;--text-lg:21px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;
  --radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
  --motion-fast:180ms;--ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);border-radius:46px;
  box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media(max-width:430px){body{background:var(--bg);}.device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
  border-bottom:1px solid var(--border);
}
.topbar .brand{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.08em;}
.topbar a{text-decoration:none;color:var(--fg);display:flex;align-items:center;}
.topbar a:active{opacity:.5;}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:var(--space-5) var(--space-6) var(--space-8);}

.section-title{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
  color:var(--accent);margin-bottom:var(--space-3);margin-top:var(--space-6);
}
.section-title:first-child{margin-top:0;}

/* 拍照 */
.photo-wrap{display:flex;gap:8px;flex-wrap:wrap;}
.photo-add{
  width:72px;height:72px;border-radius:var(--radius-md);
  border:1.5px dashed var(--border);background:var(--surface);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;gap:4px;
  font-family:var(--font-mono);font-size:22px;color:var(--muted);
}
.photo-add span{font-size:8px;letter-spacing:.04em;}
.photo-thumb-wrap{position:relative;width:72px;height:72px;}
.photo-thumb{
  width:72px;height:72px;border-radius:var(--radius-md);
  background:var(--surface);border:1px solid var(--border);object-fit:cover;
}
.pt-del{
  position:absolute;top:-5px;right:-5px;width:18px;height:18px;
  border-radius:50%;background:var(--fg);color:var(--bg);
  font-size:10px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
#photoFile{display:none;}

/* OCR按钮 */
.btn-ocr{
  width:100%;font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 92%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 70%);
  border-radius:var(--radius-md);padding:10px 0;cursor:pointer;margin-top:var(--space-3);
}
.btn-ocr:disabled{opacity:.4;}

/* 字段 */
.field{margin-bottom:var(--space-4);}
.field label{
  display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
  color:var(--muted);margin-bottom:var(--space-1);
}
.field select,.field input{
  width:100%;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--fg);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-md);
  padding:10px 12px;outline:none;
}
.field select:focus,.field input:focus{border-color:var(--accent);}
.field-row{display:flex;gap:var(--space-3);}
.field-row .field{flex:1;}

.ocr-tag{
  font-family:var(--font-mono);font-size:8px;color:#fff;
  background:var(--accent);border-radius:var(--radius-pill);
  padding:1px 6px;margin-left:6px;display:none;
}

/* 保存 */
.btn-save{
  width:100%;font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  color:#fff;background:var(--accent);border:none;
  border-radius:var(--radius-lg);padding:14px 0;cursor:pointer;margin-top:var(--space-4);
}

/* OCR Loading */
.ocr-overlay{
  position:fixed;inset:0;z-index:110;
  background:rgba(31,26,22,.7);
  display:none;align-items:center;justify-content:center;
}
.ocr-overlay.show{display:flex;}
.ocr-box{
  background:var(--surface);border-radius:var(--radius-lg);
  padding:var(--space-6);text-align:center;min-width:220px;
}
.ocr-spinner{
  width:32px;height:32px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 700ms linear infinite;margin:0 auto var(--space-4);
}
@keyframes spin{to{transform:rotate(360deg);}}
.ocr-step{font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);}
.ocr-sub{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:4px;}

/* toast */
.toast{
  position:absolute;bottom:40px;left:50%;transform:translate(-50%,12px);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;
  background:var(--fg);color:var(--bg);padding:8px 20px;
  border-radius:var(--radius-pill);opacity:0;transition:opacity 280ms var(--ease-standard),transform 280ms var(--ease-standard);
  z-index:99;pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%,0);}

/* 选择器面板 */
.picker-overlay{
  position:absolute;inset:0;z-index:60;
  background:rgba(31,26,22,.5);
  display:none;align-items:flex-end;
}
.picker-overlay.show{display:flex;}
.picker-box{
  width:100%;background:var(--bg);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding-bottom:calc(env(safe-area-inset-bottom) + var(--space-3));
  max-height:70%;display:flex;flex-direction:column;
}
.picker-head{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-4) var(--space-6);
  border-bottom:1px solid var(--border);font-size:var(--text-sm);
}
.picker-close{font-size:16px;background:none;border:none;color:var(--muted);cursor:pointer;}
.picker-search{width:100%;padding:10px 16px;border:none;outline:none;font-family:var(--font-body);font-size:var(--text-sm);background:var(--bg);}
.picker-search-wrap{padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--border);}
.picker-list{
  flex:1;display:flex;overflow:hidden;min-height:0;
}
.picker-cats{
  flex:0 0 80px;overflow-y:auto;background:var(--bg);
  border-right:1px solid var(--border-soft);
}
.picker-cats .pc-item{
  padding:12px 8px;font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;
  color:var(--muted);cursor:pointer;text-align:center;
}
.picker-cats .pc-item.active{color:var(--accent);background:var(--surface);font-weight:bold;}
.picker-items{
  flex:1;overflow-y:auto;
}
.picker-items .pli-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  cursor:pointer;border-bottom:1px solid var(--border-soft);
}
.picker-items .pli-item:active{background:color-mix(in oklab,var(--accent),transparent 95%);}
.plii-icon{font-size:20px;}
.plii-name{font-size:var(--text-sm);color:var(--fg);}
.plii-check{font-size:14px;color:var(--accent);margin-left:auto;opacity:0;}
.pli-item.sel .plii-check{opacity:1;}
.picker-foot{
  flex:0 0 auto;display:flex;gap:10px;padding:var(--space-3) var(--space-6);
  border-top:1px solid var(--border);
}
.picker-foot button{
  font-family:var(--font-mono);font-size:11px;padding:10px 0;border-radius:var(--radius-md);
  border:none;cursor:pointer;
}
.pf-cancel{flex:1;background:transparent;color:var(--muted);border:1px solid var(--border)!important;}
.pf-confirm{flex:1;background:var(--accent);color:#fff;}
.pf-confirm:disabled{opacity:.4;}

/* 食材选择触发按钮 */
.ing-trigger{
  display:flex;align-items:center;gap:8px;
  width:100%;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--fg);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-md);
  padding:10px 12px;cursor:pointer;
}
.ing-trigger::after{content:'▾';color:var(--muted);font-size:12px;margin-left:auto;}
.ing-trigger .it-icon{font-size:20px;}
</style>
</head>
<body>
<div class="device">
  <header class="topbar">
    <a href="inventory-manage.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <span class="brand">添加库存</span>
    <span></span>
  </header>

  <main class="main">
    <!-- 拍照 -->
    <div class="section-title">拍摄包装</div>
    <div class="photo-wrap" id="photoWrap">
      <div class="photo-add" id="photoAdd">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>拍照</span>
      </div>
      <input type="file" id="photoFile" accept="image/*" capture="environment" multiple>
    </div>
    <button class="btn-ocr" id="ocrBtn" disabled>🔍 识别提取信息</button>

    <!-- 基本信息 -->
    <div class="section-title">基本信息</div>
    <div class="field"><label>食材</label><div class="ing-trigger" id="ingTrigger"><span class="it-icon" id="ingIcon">🥬</span><span id="ingName">选择食材</span></div></div>
    <div class="field"><label>商品名</label><input id="productName" type="text" autocomplete="off" placeholder="如：盒马有机小白菜"></div>
    <div class="field"><label>规格 <span class="ocr-tag" id="ocrSpec">OCR</span></label><input id="spec" type="text" autocomplete="off" placeholder="如：300g/袋"></div>
    <div class="field"><label>数量（如：500g / 1瓶 / 2个）</label><input id="amt" type="text" autocomplete="off" placeholder="500g"></div>
    <div class="field-row">
      <div class="field"><label>品牌 <span class="ocr-tag" id="ocrBrand">OCR</span></label><input id="brand" type="text" autocomplete="off" placeholder="如：盒马有机"></div>
      <div class="field"><label>价格</label><input id="price" type="text" autocomplete="off" placeholder="¥8.9"></div>
    </div>
    <div class="field"><label>采购渠道</label>
      <select id="channel">
        <option value="">请选择</option>
        <option value="山姆">山姆</option>
        <option value="盒马">盒马</option>
        <option value="奥乐齐">奥乐齐</option>
        <option value="菜市场">菜市场</option>
        <option value="超市">超市</option>
        <option value="京东">京东</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field"><label>生产日期 <span class="ocr-tag" id="ocrProd">OCR</span></label><input id="prodDate" type="text" autocomplete="off" placeholder="2024-03-15"></div>
      <div class="field"><label>保质期 <span class="ocr-tag" id="ocrExp">OCR</span></label><input id="expDate" type="text" autocomplete="off" placeholder="12个月 / 至2025-03"></div>
    </div>
    <div class="field"><label>储藏条件</label>
      <select id="storage">
        <option value="">请选择</option>
        <option value="常温">常温</option>
        <option value="冷藏">冷藏（0-4°C）</option>
        <option value="冷冻">冷冻（-18°C）</option>
        <option value="避光">避光</option>
        <option value="干燥">干燥</option>
      </select>
    </div>
    <button class="btn-save" id="saveBtn">保存到库存</button>
  </main>

  <div class="ocr-overlay" id="ocrOverlay">
    <div class="ocr-box">
      <div class="ocr-spinner"></div>
      <div class="ocr-step" id="ocrStep">正在分析图片...</div>
      <div class="ocr-sub" id="ocrSub"></div>
    </div>
  </div>
  <!-- 食材选择面板 -->
  <div class="picker-overlay" id="pickerOverlay">
    <div class="picker-box">
      <div class="picker-head"><span>选择食材</span><button class="picker-close" id="pickerClose">✕</button></div>
      <div class="picker-search-wrap"><input class="picker-search" id="pickerSearch" type="text" autocomplete="off" placeholder="搜索食材名称"></div>
      <div class="picker-list">
        <div class="picker-cats" id="pickerCats"></div>
        <div class="picker-items" id="pickerItems"></div>
      </div>
      <div class="picker-foot">
        <button class="pf-cancel" id="pickerCancel">取消</button>
        <button class="pf-confirm" id="pickerConfirm">确定</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script>
(function(){
  var ALL=[
    {id:61,n:'小白菜',icon:'🥬',cat:'蔬果'},{id:62,n:'蒜',icon:'🧄',cat:'蔬果'},{id:63,n:'食用油',icon:'🫗',cat:'调味'},
    {id:57,n:'盐',icon:'🧂',cat:'调味'},{id:59,n:'葱',icon:'🧅',cat:'蔬果'},{id:60,n:'姜',icon:'🫚',cat:'蔬果'},
    {id:8,n:'鸡蛋',icon:'🥚',cat:'蛋白'},{id:9,n:'鸡胸肉',icon:'🍗',cat:'蛋白'},{id:10,n:'牛腩',icon:'🥩',cat:'蛋白'},
    {id:11,n:'牛肉',icon:'🥩',cat:'蛋白'},{id:12,n:'鸭肉',icon:'🦆',cat:'蛋白'},{id:13,n:'鱼肉',icon:'🐟',cat:'蛋白'},
    {id:14,n:'豆腐',icon:'🧈',cat:'蛋白'},
    {id:1,n:'燕麦',icon:'🌾',cat:'主食'},{id:2,n:'大米',icon:'🍚',cat:'主食'},{id:3,n:'面条',icon:'🍜',cat:'主食'},
    {id:5,n:'米饭',icon:'🍚',cat:'主食'},{id:6,n:'包子',icon:'🥟',cat:'主食'},{id:7,n:'水饺',icon:'🥟',cat:'主食'},
    {id:15,n:'黄瓜',icon:'🥒',cat:'蔬果'},{id:16,n:'番茄',icon:'🍅',cat:'蔬果'},
    {id:18,n:'苹果',icon:'🍎',cat:'蔬果'},{id:19,n:'蓝莓',icon:'🫐',cat:'蔬果'},{id:20,n:'草莓',icon:'🍓',cat:'蔬果'},
    {id:22,n:'脐橙',icon:'🍊',cat:'蔬果'},{id:23,n:'猕猴桃',icon:'🥝',cat:'蔬果'},
    {id:24,n:'牛油果',icon:'🥑',cat:'蔬果'},{id:25,n:'柠檬',icon:'🍋',cat:'蔬果'},
    {id:30,n:'芹菜',icon:'🥬',cat:'蔬果'},{id:33,n:'西兰花',icon:'🥦',cat:'蔬果'},
    {id:36,n:'茄子',icon:'🍆',cat:'蔬果'},{id:37,n:'冬瓜',icon:'🍈',cat:'蔬果'},
    {id:42,n:'生菜',icon:'🥬',cat:'蔬果'},{id:44,n:'菜心',icon:'🥬',cat:'蔬果'},
    {id:47,n:'花生',icon:'🥜',cat:'坚果'},{id:48,n:'核桃',icon:'🥜',cat:'坚果'},{id:51,n:'杏仁',icon:'🥜',cat:'坚果'},
    {id:54,n:'牛奶',icon:'🥛',cat:'乳饮'},{id:55,n:'酸奶',icon:'🥛',cat:'乳饮'},
    {id:71,n:'土豆',icon:'🥔',cat:'蔬果'},{id:72,n:'腊肠',icon:'🥓',cat:'蛋白'},{id:73,n:'南瓜',icon:'🎃',cat:'蔬果'},
    {id:74,n:'腊肉',icon:'🥓',cat:'蛋白'},{id:75,n:'芋头',icon:'🍠',cat:'蔬果'},
  ];

  var KEY='yzys_inventory';
  var items=[];try{items=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){}
  var photoFiles=[];
  var selectedIngId=null;
  var ingMap={};ALL.forEach(function(m){ingMap[m.id]=m;});

  /* 食材面板 */
  var ingByCat={};ALL.forEach(function(m){var cat=m.cat;if(!ingByCat[cat]) ingByCat[cat]=[];ingByCat[cat].push(m);});
  var activePickerCat='';
  var catOrder=['主食','蛋白','蔬果','坚果','乳饮','调味'];

  function openPicker(){
    activePickerCat=catOrder[0];
    renderPickerCats();
    renderPickerItems();
    document.getElementById('pickerOverlay').classList.add('show');
    document.getElementById('pickerSearch').value='';
  }
  function closePicker(){document.getElementById('pickerOverlay').classList.remove('show');}
  document.getElementById('ingTrigger').addEventListener('click',openPicker);
  document.getElementById('pickerClose').addEventListener('click',closePicker);
  document.getElementById('pickerCancel').addEventListener('click',closePicker);
  document.getElementById('pickerConfirm').addEventListener('click',function(){
    if(selectedIngId){
      var m=ingMap[selectedIngId];
      document.getElementById('ingIcon').textContent=m.icon;
      document.getElementById('ingName').textContent=m.n;
    }
    closePicker();
  });

  function renderPickerCats(q){
    var el=document.getElementById('pickerCats');el.innerHTML='';
    if(q){el.innerHTML='<div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);padding:12px 8px;text-align:center;">搜索</div>';}
    else{catOrder.forEach(function(c){var d=document.createElement('div');d.className='pc-item'+(c===activePickerCat?' active':'');d.textContent=c;d.addEventListener('click',function(){activePickerCat=c;renderPickerCats();renderPickerItems();});el.appendChild(d);});}
  }
  function renderPickerItems(q){
    var el=document.getElementById('pickerItems');el.innerHTML='';var list=[];
    if(q){ALL.forEach(function(m){if(m.n.indexOf(q)>=0) list.push(m);});}
    else if(ingByCat[activePickerCat]) list=ingByCat[activePickerCat];
    list.forEach(function(m){
      var stockCount=items.filter(function(x){return x.id===m.id;}).length;
      var row=document.createElement('div');
      row.className='pli-item'+(selectedIngId===m.id?' sel':'');
      row.innerHTML='<span class="plii-icon">'+m.icon+'</span><span class="plii-name">'+m.n+(q?' ('+m.cat+')':'')+(stockCount?' 已有'+stockCount+'批':'')+'</span><span class="plii-check">✓</span>';
      row.addEventListener('click',function(){selectedIngId=m.id;renderPickerItems(q);});
      el.appendChild(row);
    });
  }
  document.getElementById('pickerSearch').addEventListener('input',function(){var q=this.value.trim().toLowerCase();renderPickerCats(q);renderPickerItems(q);});

  /* 价格自动补全两位小数 */
  document.getElementById('price').addEventListener('blur',function(){
    var v=parseFloat(this.value.trim());if(!isNaN(v)) this.value=v.toFixed(2);
  });

  /* 拍照 */
  var pw=document.getElementById('photoWrap'),pa=document.getElementById('photoAdd'),pf=document.getElementById('photoFile');
  pa.addEventListener('click',function(){pf.click();});
  pf.addEventListener('change',function(){
    Array.from(pf.files).forEach(function(f){photoFiles.push(f);});renderPhotos();pf.value='';
    document.getElementById('ocrBtn').disabled=photoFiles.length===0;
  });
  function renderPhotos(){
    pw.querySelectorAll('.photo-thumb-wrap').forEach(function(t){t.remove();});
    photoFiles.forEach(function(f,idx){
      var w=document.createElement('div');w.className='photo-thumb-wrap';
      w.innerHTML='<img class="photo-thumb" src="'+URL.createObjectURL(f)+'"><span class="pt-del">x</span>';
      w.querySelector('.pt-del').addEventListener('click',function(){photoFiles.splice(idx,1);renderPhotos();document.getElementById('ocrBtn').disabled=photoFiles.length===0;});
      pw.insertBefore(w,pa);
    });
  }

  /* OCR */
  function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(function(){t.classList.remove('show')},1800);}
  document.getElementById('ocrBtn').addEventListener('click',function(){
    if(!photoFiles.length) return;
    var overlay=document.getElementById('ocrOverlay'),steps=['正在分析图片...','识别文字区域...','提取商标信息...','解析规格参数...'],step=0;
    document.getElementById('ocrStep').textContent=steps[0];document.getElementById('ocrSub').textContent='';
    overlay.classList.add('show');
    var timer=setInterval(function(){
      step++;if(step<steps.length){document.getElementById('ocrStep').textContent=steps[step];document.getElementById('ocrSub').textContent='处理中...';}
      else{clearInterval(timer);setTimeout(function(){
        overlay.classList.remove('show');
        ['brand','spec','prodDate','expDate'].forEach(function(k,idx){var ids=['brand','spec','prodDate','expDate'];document.getElementById(ids[idx]).value=['盒马有机','300g/袋','2025-06-15','12个月'][idx];document.getElementById('ocr'+ids[idx].charAt(0).toUpperCase()+ids[idx].slice(1)).style.display='inline';});
        showToast('已识别商标、规格、日期');
      },600);}
    },700);
  });

  /* 保存 */
  document.getElementById('saveBtn').addEventListener('click',function(){
    if(!selectedIngId){showToast('请选择食材');return;}
    var id=selectedIngId;
    var amt=document.getElementById('amt').value.trim()||'适量';
    items=[];try{items=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){}
    if(false){}  /* 允许同食材多批次入库 */
    items.push({id:id,amt:amt,productName:document.getElementById('productName').value.trim(),brand:document.getElementById('brand').value.trim(),price:document.getElementById('price').value.trim(),channel:document.getElementById('channel').value.trim(),spec:document.getElementById('spec').value.trim(),prodDate:document.getElementById('prodDate').value.trim(),expDate:document.getElementById('expDate').value.trim(),storage:document.getElementById('storage').value});
    try{localStorage.setItem(KEY,JSON.stringify(items));}catch(e){}
    showToast('已添加');setTimeout(function(){location.href='inventory-manage.html';},600);
  });
})();
</script>
</body>
</html>
