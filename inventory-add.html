<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;family=Source+Serif+Pro:wght@400;600&amp;display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 添加库存</title>
<style>
:root{
  --bg:#fbf7f0;--surface:#fffdf8;--fg:#1f1a16;--fg-2:#4b4038;
  --muted:#7d7168;--accent:#3f7a4e;
  --border:#ded3c5;--border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-sm:14px;--text-base:18px;--text-lg:21px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;
  --radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
  --motion-fast:180ms;--ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);border-radius:46px;
  box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media(max-width:430px){body{background:var(--bg);}.device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
}
.topbar .brand{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.08em;}
.topbar a{text-decoration:none;color:var(--fg);display:flex;align-items:center;}
.topbar a:active{opacity:.5;}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:var(--space-5) var(--space-6) var(--space-8);}

/* 拍照区 */
.photo-section{margin-bottom:var(--space-5);}
.photo-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--muted);margin-bottom:var(--space-2);}
.photo-area{
  display:flex;gap:10px;flex-wrap:wrap;
}
.photo-add{
  width:72px;height:72px;border-radius:var(--radius-md);
  border:1px dashed var(--border);background:var(--surface);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;gap:2px;font-size:22px;color:var(--muted);
}
.photo-add span{font-family:var(--font-mono);font-size:8px;letter-spacing:.04em;margin-top:-2px;}
.photo-add:active{background:color-mix(in oklab,var(--accent),transparent 94%);}
.photo-thumb{
  width:72px;height:72px;border-radius:var(--radius-md);
  background:var(--surface);border:1px solid var(--border);
  object-fit:cover;position:relative;
}
.photo-thumb-wrap{position:relative;display:inline-block;}
.photo-thumb-wrap .pt-del{
  position:absolute;top:-6px;right:-6px;width:18px;height:18px;
  border-radius:50%;background:var(--fg);color:var(--bg);
  font-size:10px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#photoFile{display:none;}

/* OCR按钮 */
.btn-ocr{
  width:100%;font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 92%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 70%);
  border-radius:var(--radius-md);padding:10px 0;cursor:pointer;margin-top:var(--space-2);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-ocr:disabled{opacity:.5;pointer-events:none;}
.btn-ocr:active{opacity:.8;}

/* 表单 */
.field{margin-bottom:var(--space-4);}
.field label{
  display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
  color:var(--muted);margin-bottom:var(--space-1);
}
.field select,.field input{
  width:100%;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--fg);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-md);
  padding:12px;outline:none;
}
.field select:focus,.field input:focus{border-color:var(--accent);}
.field-row{display:flex;gap:var(--space-3);}
.field-row .field{flex:1;}
.field .ocr-tag{
  font-family:var(--font-mono);font-size:8px;color:#fff;
  background:var(--accent);border-radius:var(--radius-pill);
  padding:1px 6px;margin-left:6px;vertical-align:middle;
}

.btn-save{
  width:100%;font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  color:#fff;background:var(--accent);border:none;
  border-radius:var(--radius-lg);padding:14px 0;cursor:pointer;margin-top:var(--space-4);
}
.btn-save:active{opacity:.85;}

/* OCR Loading */
.ocr-overlay{
  position:fixed;inset:0;z-index:110;
  background:rgba(31,26,22,.7);
  display:none;align-items:center;justify-content:center;
}
.ocr-overlay.show{display:flex;}
.ocr-box{
  background:var(--surface);border-radius:var(--radius-lg);
  padding:var(--space-6);text-align:center;min-width:240px;
}
.ocr-spinner{
  width:32px;height:32px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 700ms linear infinite;margin:0 auto var(--space-4);
}
@keyframes spin{to{transform:rotate(360deg);}}
.ocr-box .ocr-step{
  font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);
  margin-bottom:4px;
}
.ocr-box .ocr-sub{
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
}

/* toast */
.toast{
  position:absolute;bottom:40px;left:50%;transform:translate(-50%,12px);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;
  background:var(--fg);color:var(--bg);padding:8px 20px;
  border-radius:var(--radius-pill);opacity:0;transition:opacity 280ms var(--ease-standard),transform 280ms var(--ease-standard);
  z-index:99;pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
<div class="device">
  <header class="topbar">
    <a href="inventory-manage.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
    <span class="brand">添加库存</span>
    <span></span>
  </header>
  <main class="main">
    <!-- 拍照 -->
    <div class="photo-section">
      <div class="photo-label">📷 拍摄包装（支持多张）</div>
      <div class="photo-area" id="photoArea">
        <div class="photo-add" id="photoAdd">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <span>拍照/相册</span>
        </div>
        <input type="file" id="photoFile" accept="image/*" capture="environment" multiple>
      </div>
      <button class="btn-ocr" id="ocrBtn" disabled>🔍 识别提取信息</button>
    </div>

    <!-- 表单 -->
    <div class="field"><label>食材</label><select id="ing"></select></div>
    <div class="field"><label>数量（如：500g / 1瓶 / 2个）</label><input id="amt" type="text" autocomplete="off" placeholder="500g"></div>
    <div class="field-row">
      <div class="field"><label>品牌<span class="ocr-tag" id="ocrBrand" style="display:none">OCR</span></label><input id="brand" type="text" autocomplete="off" placeholder="如：盒马有机"></div>
      <div class="field"><label>价格</label><input id="price" type="text" autocomplete="off" placeholder="¥8.9"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>规格<span class="ocr-tag" id="ocrSpec" style="display:none">OCR</span></label><input id="spec" type="text" autocomplete="off" placeholder="如：300g/袋"></div>
      <div class="field"><label>采购渠道</label><input id="channel" type="text" autocomplete="off" placeholder="如：盒马 / 菜市场"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>生产日期<span class="ocr-tag" id="ocrProd" style="display:none">OCR</span></label><input id="prodDate" type="text" autocomplete="off" placeholder="如：2024-03-15"></div>
      <div class="field"><label>保质期<span class="ocr-tag" id="ocrExp" style="display:none">OCR</span></label><input id="expDate" type="text" autocomplete="off" placeholder="如：12个月 / 至2025-03"></div>
    </div>
    <button class="btn-save" id="saveBtn">保存到库存</button>
  </main>

  <!-- OCR Loading -->
  <div class="ocr-overlay" id="ocrOverlay">
    <div class="ocr-box">
      <div class="ocr-spinner"></div>
      <div class="ocr-step" id="ocrStep">正在分析图片...</div>
      <div class="ocr-sub" id="ocrSub"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
(function(){
  var ALL=[
    {id:61,n:'小白菜',icon:'🥬',cat:'蔬果'},{id:62,n:'蒜',icon:'🧄',cat:'蔬果'},{id:63,n:'食用油',icon:'🫗',cat:'调味'},
    {id:57,n:'盐',icon:'🧂',cat:'调味'},{id:59,n:'葱',icon:'🧅',cat:'蔬果'},{id:60,n:'姜',icon:'🫚',cat:'蔬果'},
    {id:8,n:'鸡蛋',icon:'🥚',cat:'蛋白'},{id:9,n:'鸡胸肉',icon:'🍗',cat:'蛋白'},{id:10,n:'牛腩',icon:'🥩',cat:'蛋白'},
    {id:11,n:'牛肉',icon:'🥩',cat:'蛋白'},{id:12,n:'鸭肉',icon:'🦆',cat:'蛋白'},{id:13,n:'鱼肉',icon:'🐟',cat:'蛋白'},
    {id:14,n:'豆腐',icon:'🧈',cat:'蛋白'},
    {id:1,n:'燕麦',icon:'🌾',cat:'主食'},{id:2,n:'大米',icon:'🍚',cat:'主食'},{id:3,n:'面条',icon:'🍜',cat:'主食'},
    {id:5,n:'米饭',icon:'🍚',cat:'主食'},{id:6,n:'包子',icon:'🥟',cat:'主食'},{id:7,n:'水饺',icon:'🥟',cat:'主食'},
    {id:15,n:'黄瓜',icon:'🥒',cat:'蔬果'},{id:16,n:'番茄',icon:'🍅',cat:'蔬果'},
    {id:18,n:'苹果',icon:'🍎',cat:'蔬果'},{id:19,n:'蓝莓',icon:'🫐',cat:'蔬果'},{id:20,n:'草莓',icon:'🍓',cat:'蔬果'},
    {id:22,n:'脐橙',icon:'🍊',cat:'蔬果'},{id:23,n:'猕猴桃',icon:'🥝',cat:'蔬果'},
    {id:24,n:'牛油果',icon:'🥑',cat:'蔬果'},{id:25,n:'柠檬',icon:'🍋',cat:'蔬果'},
    {id:30,n:'芹菜',icon:'🥬',cat:'蔬果'},{id:33,n:'西兰花',icon:'🥦',cat:'蔬果'},
    {id:36,n:'茄子',icon:'🍆',cat:'蔬果'},{id:37,n:'冬瓜',icon:'🍈',cat:'蔬果'},
    {id:42,n:'生菜',icon:'🥬',cat:'蔬果'},{id:44,n:'菜心',icon:'🥬',cat:'蔬果'},
    {id:47,n:'花生',icon:'🥜',cat:'坚果'},{id:48,n:'核桃',icon:'🥜',cat:'坚果'},{id:51,n:'杏仁',icon:'🥜',cat:'坚果'},
    {id:54,n:'牛奶',icon:'🥛',cat:'乳饮'},{id:55,n:'酸奶',icon:'🥛',cat:'乳饮'},
    {id:71,n:'土豆',icon:'🥔',cat:'蔬果'},{id:72,n:'腊肠',icon:'🥓',cat:'蛋白'},{id:73,n:'南瓜',icon:'🎃',cat:'蔬果'},
    {id:74,n:'腊肉',icon:'🥓',cat:'蛋白'},{id:75,n:'芋头',icon:'🍠',cat:'蔬果'},
  ];

  var KEY='yzys_inventory';
  var items=[];try{items=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){}
  var photoFiles=[];

  /* 食材选择 */
  var sel=document.getElementById('ing');
  var catOrder=['主食','蛋白','蔬果','坚果','乳饮','调味'];
  catOrder.forEach(function(cat){
    var group=document.createElement('optgroup');
    group.label=cat;
    ALL.filter(function(m){return m.cat===cat;}).forEach(function(m){
      if(items.some(function(x){return x.id===m.id;})) return;
      var o=document.createElement('option');o.value=m.id;o.textContent=m.icon+' '+m.n;group.appendChild(o);
    });
    if(group.children.length) sel.appendChild(group);
  });
  if(!sel.children.length){var o=document.createElement('option');o.value='';o.textContent='所有食材已入库';sel.appendChild(o);}

  /* 拍照 */
  var photoArea=document.getElementById('photoArea');
  var photoAdd=document.getElementById('photoAdd');
  var photoFile=document.getElementById('photoFile');
  var ocrBtn=document.getElementById('ocrBtn');

  photoAdd.addEventListener('click',function(){photoFile.click();});
  photoFile.addEventListener('change',function(){
    var files=Array.from(photoFile.files);
    files.forEach(function(f){photoFiles.push(f);});
    renderPhotos();
    ocrBtn.disabled=photoFiles.length===0;
    photoFile.value='';
  });

  function renderPhotos(){
    var thumbs=photoArea.querySelectorAll('.photo-thumb-wrap');
    thumbs.forEach(function(t){t.remove();});
    photoFiles.forEach(function(f,idx){
      var url=URL.createObjectURL(f);
      var wrap=document.createElement('div');
      wrap.className='photo-thumb-wrap';
      wrap.innerHTML='<img class="photo-thumb" src="'+url+'"><button class="pt-del">✕</button>';
      wrap.querySelector('.pt-del').addEventListener('click',function(){
        photoFiles.splice(idx,1);renderPhotos();ocrBtn.disabled=photoFiles.length===0;
      });
      photoArea.insertBefore(wrap,photoAdd);
    });
  }

  /* OCR */
  function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(function(){t.classList.remove('show')},1800);}
  document.getElementById('ocrBtn').addEventListener('click',function(){
    if(!photoFiles.length) return;
    var overlay=document.getElementById('ocrOverlay');
    var stepEl=document.getElementById('ocrStep');
    var subEl=document.getElementById('ocrSub');
    overlay.classList.add('show');

    var steps=['正在分析图片...','识别文字区域...','提取商标信息...','解析规格参数...'];
    var step=0;
    var timer=setInterval(function(){
      step++;
      if(step<steps.length){stepEl.textContent=steps[step];subEl.textContent='处理第 '+(Math.min(step+1,photoFiles.length))+'/'+photoFiles.length+' 张';}
      else{
        clearInterval(timer);
        setTimeout(function(){
          overlay.classList.remove('show');
          /* 模拟填充 */
          document.getElementById('brand').value='盒马有机';
          document.getElementById('spec').value='300g/袋';
          document.getElementById('prodDate').value='2025-06-15';
          document.getElementById('expDate').value='12个月';
          document.getElementById('ocrBrand').style.display='inline';
          document.getElementById('ocrSpec').style.display='inline';
          document.getElementById('ocrProd').style.display='inline';
          document.getElementById('ocrExp').style.display='inline';
          showToast('已识别商标、规格、日期');
        },600);
      }
    },700);
  });

  /* 保存 */
  document.getElementById('saveBtn').addEventListener('click',function(){
    var id=+sel.value;
    if(!id){showToast('请选择食材');return;}
    var amt=document.getElementById('amt').value.trim()||'适量';
    items=[];try{items=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){}
    if(items.some(function(x){return x.id===id;})){showToast('已在库存中');return;}
    items.push({
      id:id,amt:amt,
      brand:document.getElementById('brand').value.trim(),
      price:document.getElementById('price').value.trim(),
      channel:document.getElementById('channel').value.trim(),
      spec:document.getElementById('spec').value.trim(),
      prodDate:document.getElementById('prodDate').value.trim(),
      expDate:document.getElementById('expDate').value.trim()
    });
    try{localStorage.setItem(KEY,JSON.stringify(items));}catch(e){}
    showToast('已添加');
    setTimeout(function(){location.href='inventory-manage.html';},600);
  });
})();
</script>
</body>
</html>
