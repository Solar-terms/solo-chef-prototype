<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;family=Source+Serif+Pro:wght@400;600&amp;display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 库存管理</title>
<style>
:root{
  --bg:#fbf7f0;--surface:#fffdf8;--fg:#1f1a16;--fg-2:#4b4038;
  --muted:#7d7168;--accent:#3f7a4e;--danger:#b33a3a;
  --border:#ded3c5;--border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-base:18px;--text-lg:21px;--text-sm:14px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
  --motion-fast:180ms;--ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);border-radius:46px;
  box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media(max-width:430px){body{background:var(--bg);}.device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
  border-bottom:1px solid var(--border);
}
.brand{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.08em;}
.back-btn{text-decoration:none;color:var(--fg);display:flex;align-items:center;margin-right:10px;}
.back-btn:active{opacity:.5;}
.count{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-left:auto;}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 var(--space-6) var(--space-8);}

.search-bar{margin:var(--space-4) 0;}
.search-bar input{
  width:100%;font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--fg);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-pill);
  padding:9px 14px;outline:none;
}
.search-bar input:focus{border-color:var(--accent);}

.cat-title{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;
  color:var(--accent);margin:var(--space-4) 0 var(--space-2);padding-left:4px;
  border-left:2px solid color-mix(in oklab,var(--accent),transparent 60%);
}

.inv-item{
  display:flex;align-items:center;gap:var(--space-3);
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--radius-md);padding:var(--space-3);margin-bottom:6px;
}
.inv-item .iv-icon{font-size:22px;flex:0 0 auto;}

/* FAB */
.fab{
  position:absolute;bottom:calc(env(safe-area-inset-bottom) + 30px);right:var(--space-6);
  width:52px;height:52px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:26px;
  cursor:pointer;box-shadow:0 4px 16px rgba(31,26,22,.2);
  z-index:20;display:flex;align-items:center;justify-content:center;
  text-decoration:none;
}
.fab:active{opacity:.85;}

/* 列表项 */
.inv-item .iv-body{flex:1;min-width:0;}
.inv-item .iv-name{font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);}
.inv-item .iv-info{
  display:flex;gap:8px;margin-top:2px;
  font-family:var(--font-mono);font-size:9px;color:var(--muted);
}
.inv-item .iv-info span{white-space:nowrap;}
.inv-item .iv-amt{font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);min-width:60px;text-align:right;}
.inv-item .iv-del{
  font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;flex:0 0 auto;
}
.inv-item .iv-del:active{color:var(--danger);}

.empty{text-align:center;padding:var(--space-8) 0;font-family:var(--font-mono);font-size:10px;color:var(--muted);}

.toast{
  position:absolute;bottom:40px;left:50%;transform:translate(-50%,12px);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;
  background:var(--fg);color:var(--bg);padding:8px 20px;
  border-radius:var(--radius-pill);opacity:0;transition:opacity 280ms var(--ease-standard),transform 280ms var(--ease-standard);
  z-index:99;pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
<div class="device">
  <header class="topbar">
    <a class="back-btn" href="zuo_home.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <span class="brand">库存管理</span>
    <span class="count" id="count"></span>
  </header>
  <main class="main">
    <div class="search-bar"><input id="search" type="text" autocomplete="off" placeholder="搜索食材"></div>
    <div id="list"></div>
  </main>
  <a class="fab" href="inventory-add.html" title="添加库存">+</a>
  <div class="toast" id="toast"></div>
</div>
<script>
(function(){
  /* 全食材库 */
  var ALL_INGREDIENTS=[
    {id:1,n:'燕麦',icon:'🌾',cat:'主食'},{id:2,n:'大米',icon:'🍚',cat:'主食'},{id:3,n:'面条',icon:'🍜',cat:'主食'},
    {id:5,n:'米饭',icon:'🍚',cat:'主食'},{id:6,n:'包子',icon:'🥟',cat:'主食'},{id:7,n:'水饺',icon:'🥟',cat:'主食'},
    {id:8,n:'鸡蛋',icon:'🥚',cat:'蛋白'},{id:9,n:'鸡胸肉',icon:'🍗',cat:'蛋白'},
    {id:10,n:'牛腩',icon:'🥩',cat:'蛋白'},{id:11,n:'牛肉',icon:'🥩',cat:'蛋白'},
    {id:12,n:'鸭肉',icon:'🦆',cat:'蛋白'},{id:13,n:'鱼肉',icon:'🐟',cat:'蛋白'},{id:14,n:'豆腐',icon:'🧈',cat:'蛋白'},
    {id:15,n:'黄瓜',icon:'🥒',cat:'蔬果'},{id:16,n:'番茄',icon:'🍅',cat:'蔬果'},
    {id:18,n:'苹果',icon:'🍎',cat:'蔬果'},{id:19,n:'蓝莓',icon:'🫐',cat:'蔬果'},{id:20,n:'草莓',icon:'🍓',cat:'蔬果'},
    {id:21,n:'火龙果',icon:'🐉',cat:'蔬果'},{id:22,n:'脐橙',icon:'🍊',cat:'蔬果'},{id:23,n:'猕猴桃',icon:'🥝',cat:'蔬果'},
    {id:24,n:'牛油果',icon:'🥑',cat:'蔬果'},{id:25,n:'柠檬',icon:'🍋',cat:'蔬果'},
    {id:30,n:'芹菜',icon:'🥬',cat:'蔬果'},{id:32,n:'苦瓜',icon:'🥒',cat:'蔬果'},
    {id:33,n:'西兰花',icon:'🥦',cat:'蔬果'},{id:34,n:'莴苣',icon:'🥬',cat:'蔬果'},
    {id:36,n:'茄子',icon:'🍆',cat:'蔬果'},{id:37,n:'冬瓜',icon:'🍈',cat:'蔬果'},{id:38,n:'芦笋',icon:'🌿',cat:'蔬果'},
    {id:42,n:'生菜',icon:'🥬',cat:'蔬果'},{id:44,n:'菜心',icon:'🥬',cat:'蔬果'},
    {id:47,n:'花生',icon:'🥜',cat:'坚果'},{id:48,n:'核桃',icon:'🥜',cat:'坚果'},{id:49,n:'葡萄干',icon:'🍇',cat:'坚果'},
    {id:50,n:'巴旦木',icon:'🥜',cat:'坚果'},{id:51,n:'杏仁',icon:'🥜',cat:'坚果'},{id:52,n:'开心果',icon:'🥜',cat:'坚果'},
    {id:54,n:'牛奶',icon:'🥛',cat:'乳饮'},{id:55,n:'酸奶',icon:'🥛',cat:'乳饮'},
    {id:57,n:'盐',icon:'🧂',cat:'调味'},{id:59,n:'葱',icon:'🧅',cat:'蔬果'},{id:60,n:'姜',icon:'🫚',cat:'蔬果'},
    {id:61,n:'小白菜',icon:'🥬',cat:'蔬果'},{id:62,n:'蒜',icon:'🧄',cat:'蔬果'},{id:63,n:'食用油',icon:'🫗',cat:'调味'}
  ];
  var catMap={};
  ALL_INGREDIENTS.forEach(function(m){catMap[m.id]=m;});

  var KEY='yzys_inventory';
  var DEFAULTS=[
    {id:61,amt:'500g',brand:'盒马有机',price:'8.9',channel:'盒马',spec:'300g/袋'},
    {id:62,amt:'200g',brand:'',price:'3.5',channel:'菜市场',spec:''},
    {id:63,amt:'1瓶',brand:'金龙鱼',price:'29.9',channel:'京东',spec:'900ml'},
    {id:57,amt:'1袋',brand:'中盐',price:'2.5',channel:'超市',spec:'400g'},
    {id:8,amt:'10个',brand:'德青源',price:'19.9',channel:'盒马',spec:'10枚装'},
    {id:16,amt:'5个',brand:'',price:'8',channel:'菜市场',spec:''},
    {id:9,amt:'500g',brand:'泰森',price:'15.8',channel:'京东',spec:'500g/袋'},
    {id:59,amt:'1把',brand:'',price:'2',channel:'菜市场',spec:''},
    {id:54,amt:'1L',brand:'光明',price:'12.9',channel:'超市',spec:'1L'},
    {id:42,amt:'1颗',brand:'',price:'5',channel:'菜市场',spec:''},
    {id:15,amt:'3根',brand:'',price:'4.5',channel:'菜市场',spec:''}
  ];
  function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return[];}}
  function save(arr){try{localStorage.setItem(KEY,JSON.stringify(arr));}catch(e){}}
  if(!load().length) save(DEFAULTS);
  var items=load();
  var list=document.getElementById('list'),count=document.getElementById('count');
  var search=document.getElementById('search'),toast=document.getElementById('toast');

  function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(function(){toast.classList.remove('show')},1800);}
  function esc(s){return String(s||'').replace(/</g,'&lt;');}

  function render(){
    var q=(search.value||'').toLowerCase();
    var filtered=items.filter(function(x){var m=catMap[x.id];return m&&m.n.toLowerCase().indexOf(q)>=0;});
    var byCat={};
    filtered.forEach(function(x){var c=catMap[x.id].cat;if(!byCat[c]) byCat[c]=[];byCat[c].push(x);});

    list.innerHTML='';
    if(!filtered.length){list.innerHTML='<div class="empty">'+ (q?'无匹配':'库存为空，点右下角 + 添加')+'</div>';}
    var catOrder=['主食','蛋白','蔬果','坚果','乳饮','调味'];
    catOrder.forEach(function(cat){
      if(!byCat[cat]) return;
      list.innerHTML+='<div class="cat-title">'+cat+'</div>';
      byCat[cat].forEach(function(x){
        var m=catMap[x.id],idx=items.indexOf(x);
        var info=[];
        if(x.productName) info.push(esc(x.productName));
        if(x.brand) info.push(esc(x.brand));
        if(x.spec) info.push(esc(x.spec));
        if(x.price) info.push('¥'+esc(x.price));
        if(x.channel) info.push(esc(x.channel));
        if(x.prodDate) info.push('生产：'+esc(x.prodDate));
        if(x.expDate) info.push('保质：'+esc(x.expDate));
        if(x.storage) info.push('['+esc(x.storage)+']');
        list.innerHTML+=
          '<div class="inv-item"><span class="iv-icon">'+(m?m.icon:'📦')+'</span>'+
          '<div class="iv-body"><div class="iv-name">'+(m?esc(m.n):'?')+'</div>'+
          (info.length?'<div class="iv-info">'+info.map(function(s){return'<span>'+s+'</span>';}).join('')+'</div>':'')+
          '</div>'+
          '<span class="iv-amt">'+esc(x.amt)+'</span>'+
          '<button class="iv-del">✕</button>';
      });
    });
    list.querySelectorAll('.iv-del').forEach(function(el,i){el.addEventListener('click',function(){
      var idx=items.indexOf(filtered[i]);items.splice(idx,1);save(items);render();showToast('已删除');
    });});
    count.textContent=items.length+' 种';
  }

  search.addEventListener('input',render);
  render();
})();
</script>
</body>
</html>
