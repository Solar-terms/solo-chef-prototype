<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 菜谱管理</title>
<style>
:root{
  --bg:#fbf7f0;
  --surface:#fffdf8;
  --fg:#1f1a16;
  --fg-2:#4b4038;
  --muted:#7d7168;
  --accent:#3f7a4e;
  --danger:#b33a3a;
  --border:#ded3c5;
  --border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-xs:12px;--text-sm:14px;--text-base:18px;--text-lg:21px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;--space-12:48px;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
  --motion-fast:180ms;
  --ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);
  border-radius:46px;box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media (max-width:430px){
  body{background:var(--bg);}
  .device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
}
.brand{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.08em;}
.back-btn{text-decoration:none;color:var(--fg);display:flex;align-items:center;margin-right:10px;}
.back-btn:active{opacity:.5;}
.list-count{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-left:auto;}

.main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 var(--space-6) var(--space-12);
}

/* 搜索 */
.search-bar{padding:var(--space-4) 0 var(--space-4);}
.search-bar input{
  width:100%;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--fg);background:transparent;
  border:none;border-bottom:1px solid var(--border);
  padding:10px 2px;outline:none;
}
.search-bar input:focus{border-bottom-color:var(--accent);}
.search-bar input::placeholder{color:var(--muted);}

/* 菜谱卡片 */
.recipe-grid{display:flex;flex-direction:column;gap:var(--space-4);}
.recipe-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:var(--space-5);
  cursor:pointer;text-decoration:none;color:inherit;
  transition:border-color var(--motion-fast) var(--ease-standard),box-shadow var(--motion-fast) var(--ease-standard);
}
.recipe-card:active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(63,122,78,.08);}
.recipe-card .rc-head{display:flex;align-items:center;gap:var(--space-4);margin-bottom:8px;}
.recipe-card .rc-icon{
  width:44px;height:44px;border-radius:var(--radius-md);
  background:color-mix(in oklab,var(--accent),transparent 88%);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto;
}
.recipe-card .rc-meta{flex:1;min-width:0;}
.recipe-card .rc-name{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.04em;}
.recipe-card .rc-ingredients{
  display:flex;flex-wrap:wrap;gap:3px;margin-top:8px;
  font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:.04em;
}
.recipe-card .rc-ing-tag{
  background:color-mix(in oklab,var(--accent),transparent 92%);
  border-radius:var(--radius-pill);padding:2px 7px;white-space:nowrap;
}

/* 新增按钮 */
.add-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;margin-top:var(--space-5);padding:var(--space-4) 0;
  font-family:var(--font-body);font-size:var(--text-base);
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-lg);cursor:pointer;text-decoration:none;
  transition:opacity var(--motion-fast) var(--ease-standard);
}
.add-btn:active{opacity:.6;}

.toast{
  position:absolute;bottom:60px;left:50%;transform:translate(-50%,12px);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;
  background:var(--fg);color:var(--bg);padding:8px 20px;
  border-radius:var(--radius-pill);
  opacity:0;transition:opacity 280ms var(--ease-standard),transform 280ms var(--ease-standard);
  z-index:99;pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
  <div class="device">
    <header class="topbar">
      <a class="back-btn" href="zuo_home.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <span class="brand">菜谱管理</span>
      <span class="list-count" id="recipeCount"></span>
    </header>

    <main class="main">
      <div class="search-bar">
        <input id="searchInput" type="text" autocomplete="off" placeholder="搜索菜谱名称">
      </div>
      <div class="recipe-grid" id="recipeList"></div>
      <a class="add-btn" href="recipe-edit.html">+ 新增菜谱</a>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>
<script>
(function () {
  /* 读写 localStorage */
  function loadRecipes() { try { return JSON.parse(localStorage.getItem('yzys_recipes')||'[]'); } catch(e){ return []; } }
  /* 食材名称速查表 */
  var INGREDIENT_LOOKUP = [
    {id:1,name:'大米'},{id:2,name:'面粉'},{id:3,name:'面条'},{id:4,name:'面包'},
    {id:5,name:'牛肉'},{id:6,name:'猪肉'},{id:7,name:'鸡肉'},{id:8,name:'鸡蛋'},{id:9,name:'鸡胸肉'},
    {id:10,name:'三文鱼'},{id:11,name:'虾仁'},{id:12,name:'豆腐'},
    {id:13,name:'白菜'},{id:14,name:'番茄'},{id:15,name:'黄瓜'},{id:16,name:'番茄'},{id:17,name:'菠菜'},
    {id:18,name:'生菜'},{id:19,name:'洋葱'},{id:20,name:'土豆'},{id:21,name:'胡萝卜'},{id:22,name:'西兰花'},
    {id:23,name:'青椒'},{id:24,name:'红椒'},{id:25,name:'蘑菇'},{id:26,name:'莲藕'},{id:27,name:'山药'},
    {id:28,name:'茄子'},{id:29,name:'冬瓜'},{id:30,name:'玉米'},{id:31,name:'南瓜'},
    {id:32,name:'苹果'},{id:33,name:'香蕉'},{id:34,name:'牛油果'},{id:35,name:'蓝莓'},{id:36,name:'草莓'},
    {id:37,name:'橙子'},{id:38,name:'柠檬'},{id:39,name:'猕猴桃'},
    {id:40,name:'核桃'},{id:41,name:'杏仁'},{id:42,name:'生菜'},
    {id:43,name:'牛奶'},{id:44,name:'酸奶'},{id:45,name:'奶酪'},
    {id:57,name:'盐'},{id:58,name:'蛋白粉'},{id:59,name:'葱'},{id:60,name:'姜'},
    {id:61,name:'小白菜'},{id:62,name:'蒜'},{id:63,name:'食用油'}
  ];
  if (!loadRecipes().length) {
    /* 初始化默认菜谱 */
    var defaults = [
      { id:1, name:'番茄炒蛋', desc:'经典家常菜', icon:'🍳', time:'约10分钟', difficulty:'容易做', source:'懒饭', video:'', ingredients:[{ingredientId:8,amount:'3 个'},{ingredientId:16,amount:'2 个'},{ingredientId:57,amount:'适量'}], steps:[{phase:'配菜',entries:[{ingredientId:8,action:'',note:'打散加少许盐'},{ingredientId:16,action:'切块',note:''}]},{phase:'炒制',entries:[{ingredientId:8,action:'炒制',note:'盛出备用'},{ingredientId:16,action:'炒制',note:'炒至出汁'},{ingredientId:null,action:'调味',note:'加入鸡蛋翻炒均匀'}]}] },
      { id:2, name:'鸡胸肉沙拉', desc:'低脂健康', icon:'🥗', time:'约15分钟', difficulty:'容易做', source:'懒饭', video:'', ingredients:[{ingredientId:9,amount:'1 块'},{ingredientId:15,amount:'半根'},{ingredientId:16,amount:'1 个'},{ingredientId:42,amount:'适量'}], steps:[{phase:'配菜',entries:[{ingredientId:9,action:'',note:'煮熟撕成丝'},{ingredientId:15,action:'切丁',note:''},{ingredientId:16,action:'切块',note:''},{ingredientId:42,action:'洗净',note:'撕碎'},{ingredientId:null,action:'调味',note:'淋上油醋汁'}]}] },
      { id:3, name:'葱花蛋汤', desc:'暖心暖胃', icon:'🫕', time:'约10分钟', difficulty:'容易做', source:'懒饭', video:'', ingredients:[{ingredientId:8,amount:'2 个'},{ingredientId:59,amount:'适量'},{ingredientId:57,amount:'适量'}], steps:[{phase:'配菜',entries:[{ingredientId:8,action:'',note:'打散备用'},{ingredientId:59,action:'切末',note:'切葱花'}]},{phase:'炖煮',entries:[{ingredientId:null,action:'炖煮',note:'水烧开放入一半葱花'},{ingredientId:8,action:'炖煮',note:'淋入蛋液搅拌'},{ingredientId:null,action:'调味',note:'撒剩余葱花和盐出锅'}]}] },
      { id:4, name:'清炒小白菜', desc:'清淡爽口', icon:'🥬', time:'约10-15分钟', difficulty:'容易做', source:'懒饭', video:'', ingredients:[{ingredientId:61,amount:'300g'},{ingredientId:62,amount:'15g（约2瓣）'},{ingredientId:63,amount:'20g'},{ingredientId:57,amount:'2g'}], steps:[{phase:'配菜',entries:[{ingredientId:61,action:'切段',note:'去掉根部，洗净沥干'},{ingredientId:62,action:'拍碎',note:'切蒜末'}]},{phase:'炒制',entries:[{ingredientId:63,action:'炒制',note:'中火加热至六成热，下蒜末爆香'},{ingredientId:61,action:'炒制',note:'转大火快速翻炒至叶片变软'},{ingredientId:null,action:'加盐',note:'炒匀出锅装盘'}]}] }
    ];
    try { localStorage.setItem('yzys_recipes', JSON.stringify(defaults)); } catch(e){}
  }

  var recipes = loadRecipes();
  var recipeList = document.getElementById('recipeList');
  var searchInput = document.getElementById('searchInput');
  var recipeCount = document.getElementById('recipeCount');

  function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  /* 食材名称速查 */
  var ingMap = {};
  INGREDIENT_LOOKUP.forEach(function(m){ ingMap[m.id]=m.name; });
  function render() {
    var q = (searchInput.value||'').trim().toLowerCase();
    var visible = 0;
    recipeList.innerHTML = '';
    recipes.forEach(function (r) {
      var match = !q || r.name.toLowerCase().indexOf(q)>=0;
      if (!match) return;
      visible++;
      var card = document.createElement('a');
      card.className = 'recipe-card';
      card.href = 'recipe-view.html?id='+r.id;
      var ingTags = (r.ingredients||[]).map(function(x) {
        var name = ingMap[x.ingredientId] || '';
        return name ? '<span class="rc-ing-tag">'+name+'</span>' : '';
      }).join('');
      card.innerHTML =
        '<div class="rc-head"><div class="rc-icon">'+r.icon+'</div><div class="rc-meta"><div class="rc-name">'+esc(r.name)+'</div></div></div>'+
        (ingTags ? '<div class="rc-ingredients">'+ingTags+'</div>' : '');
      recipeList.appendChild(card);
    });
    recipeCount.textContent = visible+' 道菜谱';
  }
  searchInput.addEventListener('input', render);
  render();
})();
</script>
</body>
</html>
