<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 菜谱管理</title>
<style>
:root{
  --bg:#fbf7f0;
  --surface:#fffdf8;
  --fg:#1f1a16;
  --fg-2:#4b4038;
  --muted:#7d7168;
  --accent:#3f7a4e;
  --danger:#b33a3a;
  --border:#ded3c5;
  --border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-xs:12px;--text-sm:14px;--text-base:18px;--text-lg:21px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;--space-12:48px;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
  --motion-fast:180ms;
  --ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);
  border-radius:46px;box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media (max-width:430px){
  body{background:var(--bg);}
  .device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
}
.brand{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.08em;}
.back-btn{text-decoration:none;color:var(--fg);display:flex;align-items:center;margin-right:10px;}
.back-btn:active{opacity:.5;}
.list-count{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-left:auto;}

.main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 var(--space-6) var(--space-12);
}

/* 搜索 */
.search-bar{padding:var(--space-4) 0 var(--space-4);}
.search-bar input{
  width:100%;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--fg);background:transparent;
  border:none;border-bottom:1px solid var(--border);
  padding:10px 2px;outline:none;
}
.search-bar input:focus{border-bottom-color:var(--accent);}
.search-bar input::placeholder{color:var(--muted);}

/* 菜谱网格 */
.recipe-grid{display:flex;flex-direction:column;gap:var(--space-4);}
.recipe-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:var(--space-5);
  cursor:pointer;transition:border-color var(--motion-fast) var(--ease-standard),box-shadow var(--motion-fast) var(--ease-standard);
}
.recipe-card:active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(63,122,78,.08);}
.recipe-card .rc-head{display:flex;align-items:center;gap:var(--space-4);margin-bottom:8px;}
.recipe-card .rc-icon{
  width:44px;height:44px;border-radius:var(--radius-md);
  background:color-mix(in oklab,var(--accent),transparent 88%);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto;
}
.recipe-card .rc-meta{flex:1;min-width:0;}
.recipe-card .rc-name{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.04em;}
.recipe-card .rc-desc{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px;}
.recipe-card .rc-info{display:flex;gap:16px;font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.04em;}

/* 新增按钮 */
.add-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;margin-top:var(--space-5);padding:var(--space-4) 0;
  font-family:var(--font-body);font-size:var(--text-base);
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-lg);cursor:pointer;
  transition:opacity var(--motion-fast) var(--ease-standard);
}
.add-btn:active{opacity:.6;}

/* —— 编辑弹窗 —— */
.modal-overlay{
  position:absolute;inset:0;z-index:20;
  background:rgba(31,26,22,.35);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 220ms var(--ease-standard);
}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal-box{
  background:var(--surface);border-radius:var(--radius-lg);
  padding:var(--space-8) var(--space-6);
  width:310px;max-height:80vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(31,26,22,.18);
  transform:translateY(12px);
  transition:transform 220ms var(--ease-standard);
  -webkit-overflow-scrolling:touch;
}
.modal-overlay.show .modal-box{transform:translateY(0);}
.modal-box .m-title{
  font-family:var(--font-display);font-size:var(--text-lg);
  color:var(--fg);margin-bottom:var(--space-5);
}
.m-field{margin-bottom:var(--space-4);}
.m-field label{
  display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;
  color:var(--muted);margin-bottom:6px;
}
.m-field input,.m-field textarea{
  width:100%;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--fg);background:transparent;
  border:none;border-bottom:1px solid var(--border);
  padding:8px 2px;outline:none;
}
.m-field input:focus,.m-field textarea:focus{border-bottom-color:var(--accent);}
.m-field textarea{min-height:50px;resize:vertical;font-family:var(--font-mono);font-size:12px;line-height:1.6;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:10px;}

/* 食材行 */
.ing-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ing-row select{
  flex:1;font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--fg);background:var(--bg);
  border:1px solid var(--border-soft);border-radius:var(--radius-sm);
  padding:8px 8px;outline:none;appearance:auto;
}
.ing-row input{
  width:80px;font-family:var(--font-mono);font-size:12px;
  color:var(--fg);background:transparent;
  border:none;border-bottom:1px solid var(--border);
  padding:6px 2px;outline:none;
}
.ing-row input:focus{border-bottom-color:var(--accent);}
.ing-row .ing-del{
  font-family:var(--font-mono);font-size:12px;color:var(--danger);
  background:none;border:none;cursor:pointer;padding:4px;
}
.add-ing-btn{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-pill);padding:4px 12px;cursor:pointer;margin-top:4px;
}
.add-ing-btn:active{opacity:.6;}

/* 步骤 */
.step-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.step-row .step-num{
  font-family:var(--font-mono);font-size:11px;color:var(--muted);
  padding-top:8px;flex:0 0 22px;text-align:right;
}
.step-row textarea{
  flex:1;font-family:var(--font-body);font-size:var(--text-sm);line-height:1.5;
  color:var(--fg);background:var(--bg);
  border:1px solid var(--border-soft);border-radius:var(--radius-sm);
  padding:8px 10px;outline:none;resize:none;min-height:36px;
}
.step-row textarea:focus{border-color:var(--accent);}
.step-row .step-del{
  font-family:var(--font-mono);font-size:12px;color:var(--danger);
  background:none;border:none;cursor:pointer;padding:8px 4px;
}

.add-step-btn{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-pill);padding:4px 12px;cursor:pointer;margin-top:4px;
}
.add-step-btn:active{opacity:.6;}

.modal-btns{display:flex;gap:12px;margin-top:var(--space-5);}
.modal-btns button{
  flex:1;font-family:var(--font-body);font-size:var(--text-sm);
  padding:10px 0;border-radius:var(--radius-lg);border:none;cursor:pointer;
}
.modal-btns .btn-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);}
.modal-btns .btn-save{background:var(--accent);color:#fff;}
.btn-delete{
  display:block;width:100%;margin-top:12px;
  font-family:var(--font-body);font-size:var(--text-sm);
  padding:8px 0;border-radius:var(--radius-lg);
  background:transparent;color:var(--danger);
  border:1px solid var(--border);cursor:pointer;
}

.toast{
  position:absolute;bottom:60px;left:50%;transform:translate(-50%,12px);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;
  background:var(--fg);color:var(--bg);padding:8px 20px;
  border-radius:var(--radius-pill);
  opacity:0;transition:opacity 280ms var(--ease-standard),transform 280ms var(--ease-standard);
  z-index:99;pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
  <div class="device">
    <header class="topbar">
      <a class="back-btn" href="zuo_home.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>

    <main class="main">

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box">

        <div class="m-field"><label>菜谱名称</label><input id="modalName" type="text" autocomplete="off" placeholder="如：番茄炒蛋"></div>
        <div class="m-field"><label>简介</label><input id="modalDesc" type="text" autocomplete="off" placeholder="如：经典家常菜"></div>
        <div class="m-field"><label>图标</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;" id="iconPicker">
            <span class="ip-item" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-soft);cursor:pointer;font-size:18px;transition:all var(--motion-fast) var(--ease-standard);">🍳</span>
            <span class="ip-item" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-soft);cursor:pointer;font-size:18px;transition:all var(--motion-fast) var(--ease-standard);">🥗</span>

            <span class="ip-item" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-soft);cursor:pointer;font-size:18px;transition:all var(--motion-fast) var(--ease-standard);">🥘</span>
            <span class="ip-item" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-soft);cursor:pointer;font-size:18px;transition:all var(--motion-fast) var(--ease-standard);">🥪</span>
            <span class="ip-item" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-soft);cursor:pointer;font-size:18px;transition:all var(--motion-fast) var(--ease-standard);">🫕</span>
            <span class="ip-item" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-soft);cursor:pointer;font-size:18px;transition:all var(--motion-fast) var(--ease-standard);">🥧</span>
          </div>
        </div>

        <div class="m-field"><label>食材（从食材库选择）</label><div id="ingRows"></div><button class="add-ing-btn" id="addIngBtn">+ 添加食材</button></div>
        <div class="m-field"><label>步骤</label><div id="stepRows"></div><button class="add-step-btn" id="addStepBtn">+ 添加步骤</button></div>

        <div class="modal-btns">
          <button class="btn-cancel" id="modalCancel">取消</button>
          <button class="btn-save" id="modalSave">保存</button>
        </div>
        <button class="btn-delete" id="modalDelete" style="display:none;">删除此菜谱</button>
      </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="confirmOverlay">
      <div class="modal-box" style="width:260px;text-align:center;">
        <div class="m-title" style="font-size:var(--text-base);margin-bottom:var(--space-3);">确认删除</div>
        <p style="font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg-2);line-height:1.6;margin-bottom:var(--space-5);" id="confirmMsg"></p>
        <div class="modal-btns">
          <button class="btn-cancel" id="confirmCancel">取消</button>
          <button class="btn-save" id="confirmOk" style="background:var(--danger);">删除</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>
<script>
(function () {
  /* 食材库 */

    { id:15,name:'黄瓜',cat:'蔬果',icon:'🥒' },{ id:16,name:'番茄',cat:'蔬果',icon:'🍅' },

  var recipes = [

      var card = document.createElement('div');
      card.className = 'recipe-card';
      card.innerHTML =
        '<div class="rc-head"><div class="rc-icon">'+r.icon+'</div><div class="rc-meta"><div class="rc-name">'+esc(r.name)+'</div><div class="rc-desc">'+esc(r.desc)+'</div></div></div>'+
        '<div class="rc-info"><span>'+r.steps.length+' 步</span><span>'+r.ingredients.length+' 种食材</span></div>';
      card.addEventListener('click',function(){openEditor(r.id);});
      recipeList.appendChild(card);
    });
    recipeCount.textContent = visible+' 道菜谱';
  }
  searchInput.addEventListener('input', render);

  /* 图标选择 */
  document.querySelectorAll('.ip-item').forEach(function (el) {
    el.addEventListener('click', function () {
      document.querySelectorAll('.ip-item').forEach(function (x) { x.style.borderColor='var(--border-soft)'; x.style.background='transparent'; });
      this.style.borderColor='var(--accent)'; this.style.background='color-mix(in oklab,var(--accent),transparent 90%)';
      selectedIcon = this.textContent;
    });
  });

  /* 渲染食材行 */
  function renderIngRows(ingredients) {
    ingRows.innerHTML = '';
    ingredients.forEach(function (ing, i) {
      var opts = '<option value="">选择食材</option>';
      allIngredients.forEach(function (it) { opts += '<option value="'+it.id+'"'+(it.id===ing.ingredientId?' selected':'')+'>'+it.name+'</option>'; });
      var row = document.createElement('div');
      row.className = 'ing-row';
      row.innerHTML = '<select>'+opts+'</select><input class="ing-amt" value="'+esc(ing.amount)+'" placeholder="用量"><button class="ing-del">✕</button>';
      row.querySelector('select').addEventListener('change', function () { ing.ingredientId = +this.value; });
      row.querySelector('.ing-amt').addEventListener('input', function () { ing.amount = this.value; });
      row.querySelector('.ing-del').addEventListener('click', function () { ingredients.splice(i,1); renderIngRows(ingredients); });
      ingRows.appendChild(row);
    });
  }

  /* 渲染步骤 */
  function renderStepRows(steps) {
    stepRows.innerHTML = '';
    steps.forEach(function (s, i) {
      var row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = '<span class="step-num">'+(i+1)+'</span><textarea placeholder="步骤 '+(i+1)+'">'+esc(s)+'</textarea><button class="step-del">✕</button>';
      row.querySelector('textarea').addEventListener('input', function () { steps[i] = this.value; });
      row.querySelector('.step-del').addEventListener('click', function () { steps.splice(i,1); renderStepRows(steps); });
      stepRows.appendChild(row);
    });
  }

  /* 打开编辑 */
  function openEditor(id) {
    editingId = id;
    var r = recipes.find(function (x) { return x.id === id; });
    if (!r) return;
    modalTitle.textContent = '编辑菜谱';
    modalName.value = r.name;
    modalDesc.value = r.desc;
    selectedIcon = r.icon;
    document.querySelectorAll('.ip-item').forEach(function (el) {
      el.style.borderColor = el.textContent === r.icon ? 'var(--accent)' : 'var(--border-soft)';
      el.style.background = el.textContent === r.icon ? 'color-mix(in oklab,var(--accent),transparent 90%)' : 'transparent';
    });
    renderIngRows(r.ingredients);
    renderStepRows(r.steps);
    modalDelete.style.display = 'block';
    overlay.classList.add('show');
  }

  /* 新增 */
  document.getElementById('addBtn').addEventListener('click', function () {
    editingId = null;
    modalTitle.textContent = '新增菜谱';
    modalName.value = ''; modalDesc.value = '';
    selectedIcon = '🍳';
    document.querySelectorAll('.ip-item').forEach(function (el) {
      el.style.borderColor = el.textContent === '🍳' ? 'var(--accent)' : 'var(--border-soft)';
      el.style.background = el.textContent === '🍳' ? 'color-mix(in oklab,var(--accent),transparent 90%)' : 'transparent';
    });
    renderIngRows([{ingredientId:0,amount:''}]);
    renderStepRows(['']);
    modalDelete.style.display = 'none';
    overlay.classList.add('show');
  });

  /* 添加食材行 */
  document.getElementById('addIngBtn').addEventListener('click', function () {
    var ings = [];
    ingRows.querySelectorAll('.ing-row').forEach(function (row) {
      var id = +row.querySelector('select').value; var amt = row.querySelector('.ing-amt').value;
      ings.push({ingredientId:id,amount:amt});
    });
    ings.push({ingredientId:0,amount:''});
    renderIngRows(ings);
  });

  /* 添加步骤 */
  document.getElementById('addStepBtn').addEventListener('click', function () {
    var steps = [];
    stepRows.querySelectorAll('.step-row textarea').forEach(function (ta) { steps.push(ta.value); });
    steps.push('');
    renderStepRows(steps);
  });

  /* 取消 */
  document.getElementById('modalCancel').addEventListener('click', function () { overlay.classList.remove('show'); });
  overlay.addEventListener('click', function (e) { if (e.target===overlay) overlay.classList.remove('show'); });

  /* 保存 */
  document.getElementById('modalSave').addEventListener('click', function () {
    var name = modalName.value.trim();
    if (!name) { showToast('请输入菜谱名称'); return; }
    var dup = recipes.find(function (r) { return r.name===name && r.id!==editingId; });
    if (dup) { showToast('菜谱「'+name+'」已存在'); return; }
    /* 收集食材 */
    var ingredients = [];
    ingRows.querySelectorAll('.ing-row').forEach(function (row) {
      var id = +row.querySelector('select').value; var amt = row.querySelector('.ing-amt').value.trim();
      if (id) ingredients.push({ingredientId:id,amount:amt||'适量'});
    });
    /* 收集步骤 */
    var steps = [];
    stepRows.querySelectorAll('.step-row textarea').forEach(function (ta) {
      var v = ta.value.trim(); if (v) steps.push(v);
    });
    if (!ingredients.length) { showToast('请至少添加一种食材'); return; }
    if (!steps.length) { showToast('请至少添加一个步骤'); return; }

    if (editingId) {
      var r = recipes.find(function (x) { return x.id === editingId; });
      if (r) { r.name=name; r.desc=modalDesc.value.trim(); r.icon=selectedIcon; r.ingredients=ingredients; r.steps=steps; }
      showToast('已更新');
    } else {
      recipes.push({ id:nextId++, name:name, desc:modalDesc.value.trim(), icon:selectedIcon, ingredients:ingredients, steps:steps });
      showToast('已添加');
    }
    overlay.classList.remove('show');
    render();
  });

  /* 删除 */
  var confirmOverlay = document.getElementById('confirmOverlay');
  var confirmMsg = document.getElementById('confirmMsg');
  var confirmOk = document.getElementById('confirmOk');
  modalDelete.addEventListener('click', function () {
    if (!editingId) return;
    var r = recipes.find(function (x) { return x.id === editingId; });
    confirmMsg.textContent = '确定删除菜谱「'+(r?r.name:'')+'」？';
    confirmOverlay.classList.add('show');
  });
  document.getElementById('confirmCancel').addEventListener('click', function () { confirmOverlay.classList.remove('show'); });
  confirmOverlay.addEventListener('click', function (e) { if (e.target===confirmOverlay) confirmOverlay.classList.remove('show'); });
  confirmOk.addEventListener('click', function () {
    if (!editingId) { confirmOverlay.classList.remove('show'); return; }
    recipes = recipes.filter(function (x) { return x.id !== editingId; });
    confirmOverlay.classList.remove('show'); overlay.classList.remove('show');
    showToast('已删除');
    render();
  });

  render();
})();
</script>
</body>
</html>
