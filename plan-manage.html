<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 方案管理</title>
<style>
:root{
  --bg:#fbf7f0;
  --surface:#fffdf8;
  --fg:#1f1a16;
  --fg-2:#4b4038;
  --muted:#7d7168;
  --accent:#3f7a4e;
  --danger:#b33a3a;
  --border:#ded3c5;
  --border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-xs:12px;--text-sm:14px;--text-base:18px;--text-lg:21px;--text-xl:26px;
  --space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;--space-12:48px;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
  --motion-fast:180ms;
  --ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);
  border-radius:46px;box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media (max-width:430px){
  body{background:var(--bg);}
  .device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
}
.brand{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.08em;}
.back-btn{text-decoration:none;color:var(--fg);display:flex;align-items:center;margin-right:10px;}
.back-btn:active{opacity:.5;}

/* ===== Tab ===== */
.tab-bar{
  flex:0 0 auto;display:flex;gap:0;
  padding:0 var(--space-6);border-bottom:1px solid var(--border);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{
  flex:0 0 auto;font-family:var(--font-mono);font-size:13px;letter-spacing:.08em;
  color:var(--muted);padding:12px 18px 10px;
  border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;
  transition:color var(--motion-fast) var(--ease-standard),border-color var(--motion-fast) var(--ease-standard);
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab.add-tab{color:var(--accent);opacity:.5;padding:12px 14px 10px;font-size:18px;}

.main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:var(--space-5) var(--space-6) var(--space-12);
}

/* ===== 方案名栏 ===== */
.plan-head{
  margin-bottom:var(--space-6);
}
.plan-head .ph-name{
  font-family:var(--font-display);font-size:var(--text-xl);letter-spacing:.06em;
  color:var(--fg);margin-bottom:4px;
}
.plan-head .ph-name input{
  font-family:var(--font-display);font-size:var(--text-xl);letter-spacing:.06em;
  color:var(--fg);background:transparent;border:none;border-bottom:1.5px solid var(--accent);
  padding:2px 4px;width:220px;outline:none;
}
.plan-head .ph-sub{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;
  color:var(--muted);
}
.plan-head .ph-row{
  display:flex;align-items:center;gap:12px;margin-top:10px;
}
.plan-head .ph-row button{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;
  border-radius:var(--radius-sm);cursor:pointer;
  transition:all var(--motion-fast) var(--ease-standard);
}
.ph-edit{
  color:var(--accent);background:none;border:1px solid var(--accent);padding:6px 16px;
}
.ph-edit:active{background:color-mix(in oklab,var(--accent),transparent 90%);}
.ph-cancel{color:var(--muted);background:none;border:1px solid var(--border);padding:6px 16px;}
.ph-cancel:active{border-color:var(--accent);}
.ph-save{color:#fff;background:var(--accent);border:none;padding:7px 20px;}
.ph-save:active{opacity:.85;}
.ph-del{color:var(--danger);background:none;border:1px solid var(--border);padding:6px 16px;}
.ph-del:active{border-color:var(--danger);}

/* ===== 分类卡片（禁食/各餐次） ===== */
.section-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:var(--space-5);
  margin-bottom:var(--space-5);
}
.section-card .sc-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:var(--space-4);
}
.section-card .sc-label{
  font-family:var(--font-display);font-size:var(--text-base);letter-spacing:.04em;
}
.section-card .sc-label .sc-sub{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
  color:var(--muted);display:block;margin-top:2px;
}
.section-card .sc-badge{
  font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;
  padding:2px 10px;border-radius:var(--radius-pill);
  flex:0 0 auto;border:1px solid;background:transparent;
}
.sc-badge.forbid{color:var(--danger);border-color:color-mix(in oklab,var(--danger),transparent 60%);background:color-mix(in oklab,var(--danger),transparent 92%);}
.sc-badge.allow{color:var(--accent);border-color:color-mix(in oklab,var(--accent),transparent 60%);background:color-mix(in oklab,var(--accent),transparent 92%);}

/* 食材芯片网格 */
.food-grid{display:flex;flex-wrap:wrap;gap:10px;}
.food-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  padding:4px 11px;border-radius:var(--radius-pill);line-height:1.3;
  border:1px solid;background:transparent;
}
.food-chip .fc-icon{font-size:14px;}
.food-chip.allow{color:var(--accent);border-color:color-mix(in oklab,var(--accent),transparent 60%);background:color-mix(in oklab,var(--accent),transparent 92%);}
.food-chip.forbid{color:var(--danger);border-color:color-mix(in oklab,var(--danger),transparent 60%);background:color-mix(in oklab,var(--danger),transparent 92%);}
.food-chip .fc-del{
  font-size:13px;cursor:pointer;opacity:.7;margin-left:2px;line-height:1;
  background:none;border:none;color:inherit;padding:0;
}
.food-chip .fc-del:active{opacity:1;}

/* 食用说明 */
/* 餐次项 */
.meal-item{
  background:var(--bg);border:1px solid var(--border-soft);
  border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);
  margin-bottom:var(--space-3);
}
.meal-item .mi-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;
}
.meal-item .mi-desc{
  font-family:var(--font-body);font-size:var(--text-sm);line-height:1.6;
  color:var(--fg-2);white-space:pre-wrap;flex:1;margin-right:8px;
}
.meal-item .mi-desc-input{
  flex:1;font-family:var(--font-body);font-size:var(--text-sm);line-height:1.5;
  color:var(--fg-2);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-sm);
  padding:8px 10px;outline:none;resize:vertical;min-height:40px;
}
.meal-item .mi-desc-input:focus{border-color:var(--accent);}
.meal-item .mi-del{
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
  background:none;border:1px solid var(--border-soft);border-radius:var(--radius-pill);
  cursor:pointer;padding:3px 12px;transition:all var(--motion-fast) var(--ease-standard);
}
.meal-item .mi-del:active{border-color:var(--danger);color:var(--danger);}
.meal-item .mi-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.meal-item .mi-add-btn{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-pill);padding:3px 12px;cursor:pointer;
  transition:opacity var(--motion-fast) var(--ease-standard);
}
.meal-item .mi-add-btn:active{opacity:.6;}
.add-item-btn{
  display:block;width:100%;
  font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;
  color:var(--muted);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-md);padding:10px;cursor:pointer;margin-top:var(--space-2);
  transition:all var(--motion-fast) var(--ease-standard);
}
.add-item-btn:active{border-color:var(--accent);color:var(--accent);}

/* + 添加食材按钮 */
.add-food-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-pill);padding:7px 16px;cursor:pointer;margin-top:var(--space-3);
  transition:all var(--motion-fast) var(--ease-standard);
}
.add-food-btn:active{border-color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 92%);}

/* ===== 备注段 ===== */
.note-card{
  background:var(--bg);border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);padding:var(--space-4) var(--space-5);
  margin-bottom:var(--space-3);
}
.note-card .nc-title{
  font-family:var(--font-display);font-size:var(--text-sm);letter-spacing:.04em;
  color:var(--fg);margin-bottom:6px;
}
.note-card .nc-title input{
  font-family:var(--font-display);font-size:var(--text-sm);letter-spacing:.04em;
  color:var(--fg);background:transparent;border:none;border-bottom:1px solid var(--border-soft);
  padding:2px 2px;width:100%;outline:none;
}
.note-card .nc-title input:focus{border-bottom-color:var(--accent);}
.note-card .nc-body{
  font-family:var(--font-body);font-size:var(--text-xs);line-height:1.7;
  color:var(--fg-2);white-space:pre-wrap;
}
.note-card .nc-body textarea{
  width:100%;font-family:var(--font-mono);font-size:11px;line-height:1.7;
  color:var(--fg-2);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-sm);
  padding:10px;outline:none;resize:vertical;min-height:60px;
}
.note-card .nc-body textarea:focus{border-color:var(--accent);}
.nc-del{
  font-family:var(--font-mono);font-size:9px;color:var(--danger);
  background:none;border:none;cursor:pointer;padding:4px 0;margin-top:4px;
}
.nc-del:active{opacity:.7;}
.add-note-btn{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;
  color:var(--muted);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-md);padding:10px;cursor:pointer;width:100%;
  transition:all var(--motion-fast) var(--ease-standard);
}
.add-note-btn:active{border-color:var(--accent);color:var(--accent);}

/* ===== 食材选择器弹窗 ===== */
.picker-overlay{
  position:absolute;inset:0;z-index:30;
  background:rgba(31,26,22,.35);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 220ms var(--ease-standard);
}
.picker-overlay.show{opacity:1;pointer-events:auto;}
.picker-box{
  background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%;height:65%;display:flex;flex-direction:column;
  box-shadow:0 -4px 30px rgba(31,26,22,.12);
  transform:translateY(20px);
  transition:transform 260ms var(--ease-standard);
}
.picker-overlay.show .picker-box{transform:translateY(0);}
.picker-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border-soft);
}
.picker-head .ph-title{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);}
.picker-head .ph-close{
  font-size:18px;color:var(--muted);
  background:none;border:none;cursor:pointer;padding:4px;
}
.picker-search{
  padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--border-soft);
}
.picker-search input{
  width:100%;font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--fg);background:var(--bg);
  border:none;border-radius:var(--radius-pill);padding:10px 14px;outline:none;
}
.picker-search input:focus{box-shadow:0 0 0 2px color-mix(in oklab,var(--accent),transparent 76%);}
.picker-list{
  flex:1;display:flex;overflow:hidden;
}
.picker-cats{
  width:82px;flex:0 0 auto;overflow-y:auto;
  border-right:1px solid var(--border-soft);
  -webkit-overflow-scrolling:touch;
}
.picker-cats .pc-item{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;
  color:var(--muted);padding:14px 8px;cursor:pointer;text-align:center;
  border-bottom:1px solid var(--border-soft);
  transition:all var(--motion-fast) var(--ease-standard);
}
.picker-cats .pc-item.active{
  color:var(--accent);
  background:color-mix(in oklab,var(--accent),transparent 92%);
}
.picker-items{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.picker-items .pli-item{
  display:flex;align-items:center;gap:10px;
  padding:10px var(--space-4);border-bottom:1px solid var(--border-soft);cursor:pointer;
  transition:background var(--motion-fast) var(--ease-standard);
}
.picker-items .pli-item:active{background:color-mix(in oklab,var(--accent),transparent 94%);}
.picker-items .pli-item .plii-icon{
  width:28px;height:28px;border-radius:var(--radius-sm);
  background:color-mix(in oklab,var(--accent),transparent 88%);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;
}
.picker-items .pli-item .plii-meta{flex:1;min-width:0;}
.picker-items .pli-item .plii-meta .plii-name{font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);}
.picker-items .pli-item .plii-meta .plii-alias{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:1px;}
.picker-items .pli-item .plii-check{
  width:20px;height:20px;border-radius:50%;flex:0 0 auto;
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--accent);transition:all var(--motion-fast) var(--ease-standard);
}
.picker-items .pli-item.selected .plii-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.picker-noresult{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-body);font-size:var(--text-sm);color:var(--muted);
}
.picker-foot{
  display:flex;gap:12px;padding:var(--space-4) var(--space-6) calc(var(--space-4) + env(safe-area-inset-bottom));
  border-top:1px solid var(--border-soft);
}
.picker-foot button{
  flex:1;font-family:var(--font-body);font-size:var(--text-sm);
  padding:12px 0;border-radius:var(--radius-lg);border:none;cursor:pointer;
}
.picker-foot .pf-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);}
.picker-foot .pf-confirm{background:var(--accent);color:#fff;}

.toast{
  position:absolute;bottom:60px;left:50%;transform:translate(-50%,12px);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;
  background:var(--fg);color:var(--bg);padding:8px 20px;
  border-radius:var(--radius-pill);
  opacity:0;transition:opacity 280ms var(--ease-standard),transform 280ms var(--ease-standard);
  z-index:99;pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>

    <header class="topbar">
      <a class="back-btn" href="zuo_home.html">

  </div>

      if (allowDel) h += '<button class="fc-del" data-id="' + id + '">✕</button>';
      h += '</span>';
    });
    return h;
  }

  function bindEditEvents(plan) {
    document.querySelectorAll('#efGrid .fc-del').forEach(function (btn) {

        plan.forbidIds = plan.forbidIds.filter(function (id) { return id !== +btn.dataset.id; });

      });

    /* 餐次项：删除食材 */
    document.querySelectorAll('.mi-grid .fc-del').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var mkey = btn.closest('.mi-grid').dataset.mkey;
        var iid = +btn.closest('.mi-grid').dataset.iid;
        var meal = plan.meals.find(function (m) { return m.key === mkey; });
        if (meal) {
          var item = meal.items.find(function (it) { return it.id === iid; });

        var iid = +btn.dataset.iid;

        if (meal) meal.items = meal.items.filter(function (it) { return it.id !== iid; });
        renderEdit(plan);
      });
    });
    /* 餐次项：描述同步 */

        var item = meal.items.find(function (it) { return it.id === iid; });
        if (!item) return;
        openPicker('meal-item', { item: item }, function (ids) {
          ids.forEach(function (id) { if (item.ingredientIds.indexOf(id) < 0) item.ingredientIds.push(id); });

    });
    document.getElementById('editDel').addEventListener('click', function () {
      var itemIngCount = 0; plan.meals.forEach(function (m) { m.items.forEach(function (it) { itemIngCount += it.ingredientIds.length; }); });
      if (plan.forbidIds.length || itemIngCount > 0) {
        showToast('此方案下有食材关联，请先在食材管理中取消标签后再删除');
        return;
      }
      plans = plans.filter(function (p) { return p.id !== plan.id; });
      activePlanId = plans.length ? plans[Math.min(activePlanId - 1, plans.length - 1)].id : 0;
      isEditing = false; renderTabs();
      if (plans.length === 0) viewContent.innerHTML = '<div style="text-align:center;padding:48px 0;color:var(--muted);font-size:var(--text-sm);">暂无方案，点击 + 新增</div>';
      else renderContent();
      showToast('已删除');
    });
    document.getElementById('editSave').addEventListener('click', function () {
      var name = document.getElementById('editName').value.trim();
      if (!name) { showToast('请输入方案名称'); return; }
      var dup = plans.find(function (p) { return p.name === name && p.id !== plan.id; });
      if (dup) { showToast('方案名称「' + name + '」已存在'); return; }
      plan.name = name; isNewPlan = false;
      showToast('已保存');
      syncPlanTags(); renderTabs(); exitEdit();
    });
  }

  function openPicker(target, opt, callback) {
    pickerCtx = { target: target, opt: opt, callback: callback };
    var plan = plans.find(function (p) { return p.id === activePlanId; });
    if (!plan) return;
    var exist = [];
    if (target === 'forbid') exist = plan.forbidIds;
    else if (target === 'meal-item' && opt && opt.item) exist = opt.item.ingredientIds;
    pickerSelected = exist.slice();
    activePickerCat = '';
    document.getElementById('pickerTitle').textContent = target === 'forbid' ? '选择禁食食材' : '选择可食食材';
    renderPickerList('');
    document.getElementById('pickerOverlay').classList.add('show');
  }

  function renderPickerList(q) {
    var catsEl = document.getElementById('pickerCats');
    var itemsEl = document.getElementById('pickerItems');
    q = (q || '').trim().toLowerCase();
    var cats = Object.keys(ingByCat).sort();

    /* 搜索模式：隐藏左栏，右侧直接显示全部匹配 */
    if (q) {
      catsEl.innerHTML = '';
      itemsEl.innerHTML = '';
      var hasAny = false;
      cats.forEach(function (cat) {
        var arr = ingByCat[cat].filter(function (it) {
          return (it.name + ' ' + it.aliases.join(' ') + ' ' + it.cat).toLowerCase().indexOf(q) >= 0;
        });
        arr.forEach(function (it) { addItemEl(itemsEl, it); hasAny = true; });
      });
      if (!hasAny) itemsEl.innerHTML = '<div class="picker-noresult">无匹配食材</div>';
      return;
    }

    /* 级联模式 */
    /* 左栏：类目 */
    catsEl.innerHTML = '';
    if (!activePickerCat || cats.indexOf(activePickerCat) < 0) activePickerCat = cats[0];
    cats.forEach(function (cat) {
      var el = document.createElement('div');
      el.className = 'pc-item' + (cat === activePickerCat ? ' active' : '');
      el.textContent = cat;
      el.addEventListener('click', function () {
        activePickerCat = cat;
        renderPickerList('');
      });
      catsEl.appendChild(el);
    });

    /* 右栏：当前类目下的食材 */
    itemsEl.innerHTML = '';
    ingByCat[activePickerCat].forEach(function (it) { addItemEl(itemsEl, it); });
  }

  function addItemEl(parent, it) {
    var sel = pickerSelected.indexOf(it.id) >= 0;
    var el = document.createElement('div');
    el.className = 'pli-item' + (sel ? ' selected' : '');
    el.innerHTML =
      '<div class="plii-icon">' + it.icon + '</div>' +
      '<div class="plii-meta"><div class="plii-name">' + esc(it.name) + '</div><div class="plii-alias">' + esc(it.aliases.join(' · ')) + '</div></div>' +
      '<div class="plii-check">' + (sel ? '✓' : '') + '</div>';
    el.addEventListener('click', function () {
      var idx = pickerSelected.indexOf(it.id);
      if (idx >= 0) pickerSelected.splice(idx, 1);
      else pickerSelected.push(it.id);
      renderPickerList(document.getElementById('pickerSearch').value);
    });
    parent.appendChild(el);
  }

  document.getElementById('pickerSearch').addEventListener('input', function () { renderPickerList(this.value); });
  document.getElementById('pickerConfirm').addEventListener('click', function () {
    if (pickerCtx && pickerCtx.callback) pickerCtx.callback(pickerSelected);
    document.getElementById('pickerOverlay').classList.remove('show'); pickerCtx = null;
  });
  document.getElementById('pickerCancel').addEventListener('click', function () {
    document.getElementById('pickerOverlay').classList.remove('show'); pickerCtx = null;
  });
  document.getElementById('pickerClose').addEventListener('click', function () {
    document.getElementById('pickerOverlay').classList.remove('show'); pickerCtx = null;
  });

  syncPlanTags();
  renderTabs();  renderContent();
})();
</script>
</body>
</html>
