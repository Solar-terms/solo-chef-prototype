<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 编辑菜谱</title>
<style>
:root{
  --bg:#fbf7f0;
  --surface:#fffdf8;
  --fg:#1f1a16;
  --fg-2:#4b4038;
  --muted:#7d7168;
  --accent:#3f7a4e;
  --danger:#b33a3a;
  --border:#ded3c5;
  --border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-xs:12px;--text-sm:14px;--text-base:18px;--text-lg:21px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
  --motion-fast:180ms;
  --ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);
  border-radius:46px;box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media (max-width:430px){
  body{background:var(--bg);}
  .device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
  border-bottom:1px solid var(--border);
}
.brand{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.08em;}
.back-btn{text-decoration:none;color:var(--fg);display:flex;align-items:center;margin-right:10px;}
.back-btn:active{opacity:.5;}

.main{
  flex:1;display:flex;flex-direction:column;min-height:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 var(--space-6);
}

/* 进度条 —— 引导 */
.step-bar{
  width:140px;height:2px;margin:20px auto 0;
  background:var(--border);border-radius:var(--radius-pill);
  overflow:hidden;flex:0 0 auto;
}
.step-fill{
  display:block;height:100%;width:25%;
  background:var(--accent);border-radius:var(--radius-pill);
  transition:width 280ms var(--ease-standard);
}
.step-label{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;
  color:var(--muted);text-align:center;margin:6px 0 var(--space-5);
  flex:0 0 auto;
}

/* 分步 */
.wizard{flex:1;display:flex;flex-direction:column;min-height:0;}
.step{display:none;}
.step.active{display:block;flex:1;overflow-y:auto;padding:var(--space-4) 0 20px;animation:stepin 320ms var(--ease-standard) both;}
@keyframes stepin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* 区块标题 */
.section-title{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
  color:var(--accent);margin-bottom:var(--space-3);margin-top:var(--space-6);
}
.section-title:first-child{margin-top:0;}

/* 输入 */
.field{margin-bottom:var(--space-4);}
.field label{
  display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;
  color:var(--muted);margin-bottom:6px;
}
.field input,.field textarea{
  width:100%;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--fg);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-md);
  padding:10px 12px;outline:none;
}
.field input:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{min-height:50px;resize:vertical;line-height:1.6;}

/* 图标 */
.icon-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.icon-head label{margin-bottom:0;}
.ai-icon-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 92%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 65%);
  border-radius:var(--radius-pill);padding:5px 12px;cursor:pointer;
  transition:opacity var(--motion-fast) var(--ease-standard);
}
.ai-icon-btn:active{opacity:.6;}
.manage-link{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
  color:var(--muted);text-decoration:none;margin-left:auto;
}
.manage-link:active{opacity:.5;}
.ai-icon-btn .ai-tag{font-weight:bold;letter-spacing:.08em;}
.icon-grid{display:flex;flex-wrap:wrap;gap:8px;}
.ip-item{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:var(--radius-md);
  border:1px solid var(--border-soft);cursor:pointer;font-size:20px;
  transition:all var(--motion-fast) var(--ease-standard);
}
.ip-item.active{border-color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 90%);}
.ip-item.wide{width:auto;padding:0 14px;font-family:var(--font-body);font-size:var(--text-sm);}

/* 时间下拉 */
.time-sel{position:relative;}
.time-sel-btn{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--radius-md);padding:8px 12px;cursor:pointer;
}
.time-sel-btn::after{content:'▾';font-size:10px;color:var(--muted);margin-left:auto;}
.time-sel-btn:focus{border-color:var(--accent);}
.time-dropdown{
  position:absolute;top:100%;left:0;right:0;z-index:20;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-md);box-shadow:0 4px 20px rgba(31,26,22,.1);
  max-height:180px;overflow-y:auto;display:none;
}
.time-dropdown.show{display:block;}
.time-dropdown-item{
  font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);
  padding:9px 12px;cursor:pointer;transition:background var(--motion-fast);
}
.time-dropdown-item:hover,.time-dropdown-item.active{
  color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 92%);
}

/* 导入加载 */
.import-overlay{
  position:fixed;inset:0;z-index:110;
  background:rgba(31,26,22,.65);
  display:none;align-items:center;justify-content:center;
}
.import-overlay.show{display:flex;}
.import-card-inner{
  background:var(--surface);border-radius:var(--radius-xl);
  padding:var(--space-6) var(--space-8);
  text-align:center;min-width:220px;
}
.import-spinner{
  width:28px;height:28px;margin:0 auto var(--space-4);
  border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 700ms linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.import-text{
  font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--fg);
}

/* 食材行（选中后展示 + 填用量） */
.ing-row{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--radius-md);padding:8px 10px;margin-bottom:8px;
}
.ing-row .ir-icon{
  width:30px;height:30px;border-radius:var(--radius-sm);flex:0 0 auto;
  background:color-mix(in oklab,var(--accent),transparent 88%);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.ing-row .ir-name{
  flex:1;min-width:0;font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ing-row .ir-amt{
  width:88px;flex:0 0 auto;font-family:var(--font-mono);font-size:12px;
  color:var(--fg);background:var(--bg);
  border:1px solid var(--border-soft);border-radius:var(--radius-sm);
  padding:7px 8px;outline:none;text-align:center;
}
.ing-row .ir-amt:focus{border-color:var(--accent);}
.ing-row .ir-del{
  font-size:14px;color:var(--muted);
  background:none;border:none;cursor:pointer;padding:4px 2px;flex:0 0 auto;
}
.ing-row .ir-del:active{color:var(--danger);}
.ing-empty{
  font-family:var(--font-mono);font-size:11px;color:var(--muted);
  padding:14px 0;text-align:center;
}
/* 已选食材按类别分组 */
.ing-group{margin-bottom:var(--space-4);}
.ing-group:last-child{margin-bottom:0;}
.ing-group-title{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
  color:var(--muted);margin:4px 0 8px;
  padding-left:6px;border-left:2px solid color-mix(in oklab,var(--accent),transparent 60%);
}
.add-ing-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-pill);padding:7px 16px;cursor:pointer;margin-top:4px;
  transition:all var(--motion-fast) var(--ease-standard);
}
.add-ing-btn:active{border-color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 92%);}

/* 阶段卡片 */
.phase-card{
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);padding:var(--space-4);margin-bottom:var(--space-4);
}
.phase-head{
  display:flex;align-items:center;gap:8px;margin-bottom:var(--space-3);
}
.phase-head .phase-name{
  font-family:var(--font-display);font-size:var(--text-sm);color:var(--accent);
  letter-spacing:.04em;cursor:pointer;
}
.phase-head .phase-name::before{content:'▸ ';font-size:10px;opacity:.6;}
.phase-head .phase-del{
  margin-left:auto;font-size:14px;color:var(--muted);
  background:none;border:none;cursor:pointer;padding:2px 4px;
}
.phase-head .phase-del:active{color:var(--danger);}
/* 条目行 */
.phase-entry{
  display:flex;align-items:center;gap:6px;
  padding:5px 0;border-bottom:1px solid var(--border-soft);
}
.phase-entry:last-child{border-bottom:none;}
.phase-entry select{
  font-family:var(--font-body);font-size:11px;color:var(--fg);
  background:var(--bg);border:1px solid var(--border-soft);
  border-radius:var(--radius-sm);padding:5px 6px;outline:none;min-width:0;
}
.phase-entry select:focus{border-color:var(--accent);}
.phase-entry input{
  font-family:var(--font-body);font-size:11px;color:var(--fg);
  background:var(--bg);border:1px solid var(--border-soft);
  border-radius:var(--radius-sm);padding:5px 6px;outline:none;min-width:0;
}
.phase-entry input:focus{border-color:var(--accent);}
.phase-entry .entry-del{
  font-size:12px;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:2px;flex:0 0 auto;
}
.phase-entry .entry-del:active{color:var(--danger);}
.phase-add-entry{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-pill);padding:4px 12px;cursor:pointer;margin-top:6px;
  display:inline-block;
}
.phase-add-entry:active{opacity:.6;}
.add-step-btn{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  color:var(--accent);background:none;border:1px dashed var(--border);
  border-radius:var(--radius-pill);padding:6px 14px;cursor:pointer;margin-top:4px;
}
.add-step-btn:active{opacity:.6;}

/* 阶段/类型选择器（共用） */
.step-type-popover{
  display:none;flex-wrap:wrap;gap:6px;
  padding:8px 0;margin-bottom:4px;
}
.step-type-popover.show{display:flex;}
.step-type-chip{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 90%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 70%);
  border-radius:var(--radius-pill);padding:5px 12px;cursor:pointer;
  transition:all var(--motion-fast) var(--ease-standard);
}
.step-type-chip:active{opacity:.6;}

/* 起锅模板卡片（每个阶段的首步） */
.starter-card{
  background:color-mix(in oklab,var(--accent),transparent 94%);
  border:1px dashed color-mix(in oklab,var(--accent),transparent 65%);
  border-radius:var(--radius-md);
  padding:10px 12px;margin-bottom:var(--space-3);
}
.starter-title{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
  color:var(--accent);margin-bottom:8px;text-transform:uppercase;
}
.starter-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:6px;
}
.starter-row:last-child{margin-bottom:0;}
.starter-row > label{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--muted);flex:0 0 auto;width:48px;
}
.starter-row select{
  flex:1;min-width:0;
  font-family:var(--font-body);font-size:11px;color:var(--fg);
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--radius-sm);padding:4px 6px;outline:none;
}
.starter-row select:focus{border-color:var(--accent);}
.starter-row .multi-chips{
  flex:1;display:flex;flex-wrap:wrap;gap:4px;min-width:0;
}
.starter-row .multi-chip{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 90%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 65%);
  border-radius:var(--radius-pill);padding:3px 9px;cursor:pointer;
  transition:all var(--motion-fast) var(--ease-standard);
}
.starter-row .multi-chip.active{
  background:var(--accent);color:#fff;border-color:var(--accent);
}
.starter-row .multi-chip:active{opacity:.85;}
.starter-row .chip-arrow{
  font-size:9px;line-height:1;opacity:.65;cursor:pointer;padding:1px;
}
.starter-row .chip-arrow:active{opacity:1;}

/* 拖拽排序 */
.drag-list{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;}
.drag-item{
  display:flex;align-items:center;gap:4px;
  background:var(--accent);color:#fff;border-radius:var(--radius-sm);
  padding:5px 8px;font-family:var(--font-mono);font-size:10px;
  transition:transform 100ms ease;
  -webkit-user-select:none;user-select:none;
}
.drag-item.dragging{opacity:.85;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.drag-handle{
  font-size:14px;cursor:grab;line-height:1;opacity:.7;padding:0 2px;letter-spacing:-2px;
}
.drag-handle:active{cursor:grabbing;}
.drag-label{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drag-remove{font-size:12px;cursor:pointer;opacity:.7;padding:0 2px;}
.drag-remove:active{opacity:1;}
.drag-pool{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.drag-opt-chip{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
  color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 90%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 65%);
  border-radius:var(--radius-pill);padding:3px 9px;cursor:pointer;
  transition:all var(--motion-fast) var(--ease-standard);
}
.drag-opt-chip:active{opacity:.7;}

/* 网页导入卡片（与下方内容明显区分） */
.import-card{
  background:color-mix(in oklab,var(--accent),transparent 94%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 78%);
  border-radius:var(--radius-lg);
  padding:var(--space-4);
  margin-bottom:var(--space-6);
}
.import-card .section-title{display:flex;align-items:center;gap:8px;margin-top:0;margin-bottom:10px;}
.ai-badge{
  font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;font-weight:bold;
  color:var(--accent);background:color-mix(in oklab,var(--accent),transparent 88%);
  border:1px solid color-mix(in oklab,var(--accent),transparent 65%);
  border-radius:var(--radius-pill);padding:2px 7px;line-height:1;
}
.import-card .hint{
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
  line-height:1.5;margin-top:10px;
}
.import-row{display:flex;gap:8px;}
.import-row input{
  flex:1;font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--fg);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-sm);
  padding:10px 12px;outline:none;
}
.import-row input:focus{border-color:var(--accent);}
.import-row button{
  font-family:var(--font-mono);font-size:11px;
  color:#fff;background:var(--accent);border:none;
  border-radius:var(--radius-sm);padding:10px 18px;cursor:pointer;white-space:nowrap;
}
.import-row button:active{opacity:.85;}

/* 底部步进导航 */
.wizard-nav{
  margin-top:auto;
  padding:var(--space-5) 0 calc(env(safe-area-inset-bottom) + var(--space-3));
  display:flex;gap:10px;
}
.wizard-nav button{
  font-family:var(--font-body);font-size:var(--text-sm);
  padding:12px 0;border-radius:var(--radius-lg);border:none;cursor:pointer;
}
.btn-next{flex:1;background:var(--accent);color:#fff;text-align:center;}
.btn-prev{flex:0 0 auto;background:transparent;color:var(--fg-2);border:1px solid var(--border);padding:12px 20px!important;}
.btn-prev.hidden{display:none;}
.btn-del{flex:0 0 auto;background:transparent;color:var(--danger);border:1px solid var(--border)!important;padding:12px 20px!important;}
.btn-del[style*="display:none"]{display:none!important;}

/* 编辑模式：去除步骤限制，平铺展示 */
.mode-edit .step-bar,.mode-edit .step-label{display:none;}
.mode-edit .wizard-nav{display:none;}
.mode-edit .step{display:block;flex:none;}
.mode-edit .import-card{display:none;}
.mode-edit .step + .step{margin-top:var(--space-6);}
.mode-edit .step+.step::before{content:'';display:block;height:1px;background:var(--border-soft);margin-bottom:var(--space-5);}
.mode-edit .wizard{overflow-y:auto;padding-bottom:40px;}
.edit-bar{
  display:none;margin-top:auto;
  padding:var(--space-3) 0 calc(env(safe-area-inset-bottom) + var(--space-3));
  gap:10px;
}
.mode-edit .edit-bar{display:flex;}
.btn-save{flex:1;background:var(--accent);color:#fff;}

/* ===== 食材选择器（底部弹出，与方案管理一致） ===== */
.picker-overlay{
  position:absolute;inset:0;z-index:30;
  background:rgba(31,26,22,.35);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 220ms var(--ease-standard);
}
.picker-overlay.show{opacity:1;pointer-events:auto;}
.picker-box{
  background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%;height:65%;display:flex;flex-direction:column;
  box-shadow:0 -4px 30px rgba(31,26,22,.12);
  transform:translateY(20px);
  transition:transform 260ms var(--ease-standard);
}
.picker-overlay.show .picker-box{transform:translateY(0);}
.picker-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--border-soft);
}
.picker-head .ph-title{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);}
.picker-head .ph-close{
  font-size:18px;color:var(--muted);
  background:none;border:none;cursor:pointer;padding:4px;
}
.picker-search{
  padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--border-soft);
}
.picker-search input{
  width:100%;font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--fg);background:var(--bg);
  border:none;border-radius:var(--radius-pill);padding:10px 14px;outline:none;
}
.picker-search input:focus{box-shadow:0 0 0 2px color-mix(in oklab,var(--accent),transparent 76%);}
.picker-list{flex:1;display:flex;overflow:hidden;}
.picker-cats{
  width:82px;flex:0 0 auto;overflow-y:auto;
  border-right:1px solid var(--border-soft);
  -webkit-overflow-scrolling:touch;
}
.picker-cats .pc-item{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;

}
.picker-cats .pc-item.active{
  color:var(--accent);

}
.picker-items{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.picker-items .pli-item{
  display:flex;align-items:center;gap:10px;
  padding:10px var(--space-4);border-bottom:1px solid var(--border-soft);cursor:pointer;
  transition:background var(--motion-fast) var(--ease-standard);
}
.picker-items .pli-item:active{background:color-mix(in oklab,var(--accent),transparent 94%);}
.picker-items .pli-item .plii-icon{
  width:28px;height:28px;border-radius:var(--radius-sm);
  background:color-mix(in oklab,var(--accent),transparent 88%);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;
}
.picker-items .pli-item .plii-meta{flex:1;min-width:0;}
.picker-items .pli-item .plii-meta .plii-name{font-family:var(--font-body);font-size:var(--text-sm);color:var(--fg);}
.picker-items .pli-item .plii-meta .plii-alias{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:1px;}
.picker-items .pli-item .plii-check{
  width:20px;height:20px;border-radius:50%;flex:0 0 auto;
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--accent);transition:all var(--motion-fast) var(--ease-standard);
}
.picker-items .pli-item.selected .plii-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.picker-noresult{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-body);font-size:var(--text-sm);color:var(--muted);
}
.picker-foot{
  display:flex;gap:12px;padding:var(--space-4) var(--space-6) calc(var(--space-4) + env(safe-area-inset-bottom));
  border-top:1px solid var(--border-soft);
}
.picker-foot button{
  flex:1;font-family:var(--font-body);font-size:var(--text-sm);
  padding:12px 0;border-radius:var(--radius-lg);border:none;cursor:pointer;
}
.picker-foot .pf-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);}
.picker-foot .pf-confirm{background:var(--accent);color:#fff;}

/* 确认弹窗（全站统一风格） */
.modal-overlay{
  position:absolute;inset:0;z-index:40;
  background:rgba(31,26,22,.35);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 220ms var(--ease-standard);
}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal-box{
  background:var(--surface);border-radius:var(--radius-lg);
  padding:var(--space-8) var(--space-6);
  width:260px;text-align:center;
  box-shadow:0 20px 60px rgba(31,26,22,.18);

}
.modal-overlay.show .modal-box{transform:translateY(0);}
.modal-box .m-title{
  font-family:var(--font-display);font-size:var(--text-base);

}
.modal-box .m-msg{

    if (actionsByIng[ingId]) return actionsByIng[ingId];
    var meta = ingMap[ingId];
    if (!meta) return defaultActions;
    return actionsByCat[meta.cat] || defaultActions;
  }
  var phaseEditIdx = -1;

  function openPhaseOverlay(editIdx) {
    phaseEditIdx = editIdx;
    var itemsEl = document.getElementById('phaseOverlayItems');
    itemsEl.innerHTML = '';
    document.getElementById('phaseOverlay').classList.add('show');
    phaseOptions.forEach(function (p) {
      var row = document.createElement('div');
      row.className = 'pli-item';
      row.innerHTML =
        '<div class="plii-icon">▸</div>' +
        '<div class="plii-meta"><div class="plii-name">' + esc(p.name) + '</div><div class="plii-alias">' + esc(p.desc) + '</div></div>';
      row.addEventListener('click', function () {
        if (phaseEditIdx >= 0) {
          /* 改阶段时重置 modules（不同阶段模块配置不同） */
          currentSteps[phaseEditIdx].phase = p.name;
          currentSteps[phaseEditIdx].modules = createModules(p.name);
          phaseEditIdx = -1;
        } else {
          currentSteps.push({
            phase: p.name,
            modules: createModules(p.name),
            entries: phaseModules[p.name] ? [] : [{ ingredientId: null, action: '切段', heat: '中火', note: '' }]
          });
        }
        renderStepRows();
        saveDraft();
        closePhaseOverlay();
      });
      itemsEl.appendChild(row);
    });
  }
  function closePhaseOverlay() {
    document.getElementById('phaseOverlay').classList.remove('show');
    phaseEditIdx = -1;
  }
  document.getElementById('phaseOverlay').addEventListener('click', function (e) { if (e.target === this) closePhaseOverlay(); });
  document.getElementById('phaseOverlayClose').addEventListener('click', closePhaseOverlay);
  document.getElementById('phaseOverlayCancel').addEventListener('click', closePhaseOverlay);

  /* 渲染步骤（阶段大卡片：标题 + 条目行，如「配菜」→ 对小白菜切段、对蒜切片） */
  function renderStepRows() {
    stepRows.innerHTML = '';
    currentSteps.forEach(function (phase, pi) {
      var card = document.createElement('div');
      card.className = 'phase-card';
      card.innerHTML = '<div class="phase-head"><span class="phase-name">' + esc(phase.phase) + '</span><button class="phase-del">✕</button></div>';
      card.querySelector('.phase-name').addEventListener('click', function () {
        openPhaseOverlay(pi);
      });
      card.querySelector('.phase-del').addEventListener('click', function () {
        showConfirm('确定删除此阶段？\n此操作无法撤销。', function () {
          currentSteps.splice(pi, 1);
          renderStepRows();
          saveDraft();
        });
      });
      /* 固定模块卡片组 */
      if (phase.modules && phase.modules.length) {
        var tpls = phaseModules[phase.phase] || [];
        phase.modules.forEach(function (mod, mi) {
          var tpl = tpls[mi];
          if (!tpl) return;
          var sc = document.createElement('div');
          sc.className = 'starter-card';
          sc.innerHTML = '<div class="starter-title">' + esc(tpl.title) + '</div>';
          tpl.fields.forEach(function (f) {
            var row = document.createElement('div');
            row.className = 'starter-row';
            var lab = document.createElement('label');
            lab.textContent = f.label;
            row.appendChild(lab);
            if (f.type === 'select') {
              var sel = document.createElement('select');
              f.options.forEach(function (o) {
                var opt = document.createElement('option');
                opt.value = o; opt.textContent = o;
                if (mod.data[f.key] === o) opt.selected = true;
                sel.appendChild(opt);
              });
              sel.addEventListener('change', function () { mod.data[f.key] = this.value; saveDraft(); });
              row.appendChild(sel);
            } else if (f.type === 'mainIng' || f.type === 'multi') {
              /* ===== 多选 + 拖拽排序 ===== */
              var isMain = f.type === 'mainIng';
              var allOpts = isMain ? getMainIngOptions() : (f.source ? getSourceOptions(f.source) : (f.options || []));
              var selArr = mod.data[f.key] || [];
              var getVal = isMain ? function (x) { return x.id; } : function (x) { return x; };
              var displayVal = isMain ? function (id) { var m = ingMap[id]; return m ? m.icon + ' ' + m.name + getIngredientAmount(id) : id; } : function (x) { return x; };

              var container = document.createElement('div');
              container.style.cssText = 'flex:1;min-width:0;';
              if (!allOpts.length && !selArr.length) {
                var empty = document.createElement('span');
                empty.style.cssText = 'font-family:var(--font-mono);font-size:10px;color:var(--muted);padding:4px 0;';
                empty.textContent = isMain ? '尚未添加主料' : '暂无可选项';
                container.appendChild(empty);
              }
              /* 已选项：拖拽列表 */
              if (selArr.length) {
                var list = document.createElement('div');
                list.className = 'drag-list';
                selArr.forEach(function (val, idx) {
                  var item = document.createElement('div');
                  item.className = 'drag-item';
                  item.setAttribute('data-idx', idx);
                  item.innerHTML =
                    '<span class="drag-handle">⠿</span>' +
                    '<span class="drag-label" style="flex:1;min-width:0;">' + displayVal(val) + '</span>' +
                    '<span class="drag-remove">✕</span>';
                  /* 拖拽 */
                  var handle = item.querySelector('.drag-handle');
                  handle.addEventListener('touchstart', function (e) {
                    e.preventDefault();
                    var startY = e.touches[0].clientY;
                    var origIdx = mod.data[f.key].indexOf(val);
                    var items = list.querySelectorAll('.drag-item');
                    var heights = [];
                    items.forEach(function (it, i) { heights[i] = (i === 0 ? 0 : heights[i-1]) + it.offsetHeight; });
                    item.classList.add('dragging');
                    item.style.zIndex = '10';
                    var move = function (ev) {
                      var dy = ev.touches[0].clientY - startY;
                      item.style.transform = 'translateY(' + dy + 'px)';
                      /* 计算目标位置 */
                      var centerY = dy + origIdx * 36;
                      var targetIdx = Math.round(centerY / 36);
                      targetIdx = Math.max(0, Math.min(targetIdx, items.length - 1));
                      items.forEach(function (it, i) {
                        if (i === origIdx) return;
                        if (targetIdx > origIdx && i > origIdx && i <= targetIdx) it.style.transform = 'translateY(-36px)';
                        else if (targetIdx < origIdx && i >= targetIdx && i < origIdx) it.style.transform = 'translateY(36px)';
                        else it.style.transform = '';
                      });
                    };
                    var end = function () {
                      document.removeEventListener('touchmove', move);
                      document.removeEventListener('touchend', end);
                      item.classList.remove('dragging');
                      item.style.transform = '';
                      item.style.zIndex = '';
                      list.querySelectorAll('.drag-item').forEach(function (it) { it.style.transform = ''; });
                      var dy = (parseFloat(item.style.transform.replace('translateY(','').replace('px)','')) || 0);
                      var newIdx = Math.round((dy + origIdx * 36) / 36);
                      newIdx = Math.max(0, Math.min(newIdx, mod.data[f.key].length - 1));
                      if (newIdx !== origIdx) {
                        var v = mod.data[f.key].splice(origIdx, 1)[0];
                        mod.data[f.key].splice(newIdx, 0, v);
                        renderStepRows(); saveDraft();
                      }
                    };
                    document.addEventListener('touchmove', move, {passive: false});
                    document.addEventListener('touchend', end, {once: true});
                  }, {passive: false});
                  /* 移除 */
                  item.querySelector('.drag-remove').addEventListener('click', function () {
                    var i = mod.data[f.key].indexOf(val); if (i >= 0) mod.data[f.key].splice(i, 1);
                    renderStepRows(); saveDraft();
                  });
                  list.appendChild(item);
                });
                container.appendChild(list);
              }
              /* 未选项：chips */
              if (allOpts.length) {
                var pool = document.createElement('div');
                pool.className = 'drag-pool';
                allOpts.forEach(function (opt) {
                  if (selArr.indexOf(getVal(opt)) >= 0) return;
                  var chip = document.createElement('span');
                  chip.className = 'drag-opt-chip';
                  chip.textContent = displayVal(getVal(opt));
                  chip.addEventListener('click', function () {
                    mod.data[f.key].push(getVal(opt));
                    renderStepRows(); saveDraft();
                  });
                  pool.appendChild(chip);
                });
                container.appendChild(pool);
              }
              row.appendChild(container);
            }
            sc.appendChild(row);
          });
          card.appendChild(sc);
        });
      }
      /* 有模块卡的阶段（如炒制），不显示条目行和添加条目按钮 */
      var hasModules = phase.modules && phase.modules.length;
      if (!hasModules) {
        phase.entries.forEach(function (entry, ei) {
        var ingOpts = '<option value="">不选食材</option>';
        currentIngredients.forEach(function (ing) {
          var meta = ingMap[ing.ingredientId];
          if (!meta) return;
          /* 配菜阶段自动过滤调味料（食用油、盐等无需切洗），但保留已选项 */
          if (phase.phase === '配菜' && meta.cat === '调味' && entry.ingredientId !== ing.ingredientId) return;
          ingOpts += '<option value="' + ing.ingredientId + '"' + (entry.ingredientId === ing.ingredientId ? ' selected' : '') + '>' + meta.icon + ' ' + meta.name + '</option>';
        });
        /* 根据当前食材类别生成动作选项 */
        function buildActOpts(ingId, selAct) {
          return getActionsForIngredient(ingId, phase.phase).map(function (a) {
            return '<option value="' + a + '"' + (a === selAct ? ' selected' : '') + '>' + a + '</option>';
          }).join('');
        }
        var actOpts = buildActOpts(entry.ingredientId, entry.action);
        var heatOpts = heats.map(function (h) {
          return '<option value="' + h + '"' + (entry.heat === h ? ' selected' : '') + '>' + h + '</option>';
        }).join('');
        var row = document.createElement('div');
        row.className = 'phase-entry';
        /* 配菜阶段不需要火候 */
        var showHeat = phase.phase !== '配菜';
        row.innerHTML =
          '<select class="pe-ing" style="flex:2.2">' + ingOpts + '</select>' +
          '<select class="pe-act" style="flex:' + (showHeat ? '1.6' : '2.5') + '">' + actOpts + '</select>' +
          (showHeat ? '<select class="pe-heat" style="flex:1">' + heatOpts + '</select>' : '') +
          '<input class="pe-note" value="' + esc(entry.note || '') + '" placeholder="备注" style="flex:2">' +
          '<button class="entry-del">✕</button>';
        row.querySelector('.pe-ing').addEventListener('change', function () {
          entry.ingredientId = this.value ? +this.value : null;
          var newId = entry.ingredientId;
          var keep = entry.action;
          var avail = getActionsForIngredient(newId, phase.phase);
          if (avail.indexOf(keep) < 0) { entry.action = avail[0] || ''; }
          row.querySelector('.pe-act').innerHTML = avail.map(function (a) {
            return '<option value="' + a + '"' + (a === entry.action ? ' selected' : '') + '>' + a + '</option>';
          }).join('');
          saveDraft();
        });
        row.querySelector('.pe-act').addEventListener('change', function () { entry.action = this.value; saveDraft(); });
        var heatEl = row.querySelector('.pe-heat');
        if (heatEl) heatEl.addEventListener('change', function () { entry.heat = this.value; saveDraft(); });
        row.querySelector('.pe-note').addEventListener('input', function () { entry.note = this.value; saveDraft(); });
        row.querySelector('.entry-del').addEventListener('click', function () { showConfirm('确定删除此条目？\n此操作无法撤销。', function () { phase.entries.splice(ei, 1); renderStepRows(); saveDraft(); }); });
        card.appendChild(row);
      });
      var addBtn = document.createElement('button');
      addBtn.className = 'phase-add-entry';
      addBtn.textContent = '+ 添加条目';
      addBtn.addEventListener('click', function () {
        phase.entries.push({ ingredientId: null, action: '切段', heat: '中火', note: '' });
        renderStepRows();
        saveDraft();
      });
      card.appendChild(addBtn);
      }
      stepRows.appendChild(card);
    });
  }

  /* 步骤规范化：向后兼容旧格式 → [{phase, entries:[{ingredientId,action,note}]}] */
  function normalizeSteps(steps) {
    if (!steps || !steps.length) return [];
    /* 已是新格式（有 phase 字段） */
    if (steps[0].phase !== undefined) return steps.map(function (ph) {
      /* 兼容旧 starter 字段 → modules */
      var modules = ph.modules;
      if (!modules && ph.starter !== undefined) {
        var tpls = phaseModules[ph.phase] || [];
        if (tpls.length) {
          modules = createModules(ph.phase);
          if (ph.starter && modules[0]) { modules[0].data = ph.starter; }
        }
      }
      if (!modules) modules = createModules(ph.phase);
      /* 兼容旧 modules 中的单个 ingredientId（数字）→ 数组 */
      if (modules) modules.forEach(function (m) {
        if (m.data && m.data.ingredientId !== undefined && !Array.isArray(m.data.ingredientId)) {
          m.data.ingredientId = m.data.ingredientId ? [m.data.ingredientId] : [];
        }
      });
      return {
        phase: ph.phase,
        modules: modules,
        entries: (ph.entries || []).map(function (e) {
          return { ingredientId: e.ingredientId || null, action: e.action || '', heat: e.heat || '中火', note: e.note || '' };
        })
      };
    });
    /* 旧格式 {ingredientId,action,note} 或 {type,text} 或字符串 → 归入单个"配菜"阶段 */
    var entries = steps.map(function (s) {
      if (typeof s === 'string') return { ingredientId: null, action: '', heat: '中火', note: s };
      if (s.ingredientId !== undefined || s.action !== undefined) return { ingredientId: s.ingredientId || null, action: s.action || '', heat: s.heat || '中火', note: s.note || '' };
      return { ingredientId: null, action: s.type || '', heat: '中火', note: s.text || '' };
    });
    return [{ phase: '配菜', modules: null, entries: entries }];
  }

  /* 加载已有菜谱：localStorage 若缺失/内容为空，自动用内置 mock 数据填充 */
  if (editingId) {
    var r = recipes.find(function (x) { return x.id === editingId; });
    var dr = DEFAULT_RECIPES.find(function (x) { return x.id === editingId; });
    /* 找到了但食材为空 → 用默认数据填进去（深拷贝避免污染默认数据） */
    if (r && (!r.ingredients || !r.ingredients.length)) {
      if (dr) { r.ingredients = dr.ingredients.map(function (x) { return { ingredientId:x.ingredientId, amount:x.amount }; }); r.steps = normalizeSteps(dr.steps); }
      saveRecipes(recipes);
    }
    /* 优先用 localStorage 数据，找不到则用默认 */
    var src = r || dr;
    if (src) {
      pageTitle.textContent = '编辑菜谱';
      recipeName.value = src.name;
      selectedIcon = src.icon;
      selectedTime = src.time || '';
      selectedDifficulty = src.difficulty || '';
      selectedSource = src.source || '懒饭';
      document.getElementById('recipeVideo').value = src.video || '';
      document.getElementById('importUrl').value = src.sourceUrl || '';
      currentIngredients = src.ingredients.map(function (x) { return { ingredientId:x.ingredientId, amount:x.amount }; });
      currentSteps = normalizeSteps(src.steps);
      delBtn.style.display = 'block';
    }
  } else {
    /* 新增模式：预填一份示例模板（清炒小白菜），方便立即看到 mock 数据 */
    var tpl = DEFAULT_RECIPES[3];
    recipeName.value = tpl.name;
    selectedIcon = tpl.icon;
    selectedTime = tpl.time || '';
    selectedDifficulty = tpl.difficulty || '';
    selectedSource = tpl.source || '懒饭';
    document.getElementById('recipeVideo').value = tpl.video || '';
    currentIngredients = tpl.ingredients.map(function (x) { return { ingredientId:x.ingredientId, amount:x.amount }; });
    currentSteps = normalizeSteps(tpl.steps);
  }

  /* 恢复未保存草稿（防止刷新/误关丢失） */
  var _draft = getDraft();
  if (_draft && _draft.srcId === editingId) {
    recipeName.value = _draft.name || '';
    if (_draft.icon) selectedIcon = _draft.icon;
    if (_draft.time !== undefined) selectedTime = _draft.time;
    if (_draft.difficulty !== undefined) selectedDifficulty = _draft.difficulty;
    if (_draft.source !== undefined) selectedSource = _draft.source;
    if (_draft.video !== undefined) document.getElementById('recipeVideo').value = _draft.video;
    if (_draft.sourceUrl !== undefined) document.getElementById('importUrl').value = _draft.sourceUrl;
    if (_draft.ingredients) currentIngredients = _draft.ingredients;
    /* 草稿里的 steps 可能是旧格式（无 starter），用 normalizeSteps 补齐 */
    if (_draft.steps) currentSteps = normalizeSteps(_draft.steps);
  }

  renderIcons();
  renderTime();
  renderDiff();
  renderSource();
  renderIngRows();
  renderStepRows();

  /* AI 智能选择图标 */
  document.getElementById('aiIconBtn').addEventListener('click', aiPickIcon);

  /* 应用选择器结果：保留已有用量，新增的用量为空，去掉被取消勾选的 */
  function applyPicked(ids) {
    var next = [];
    ids.forEach(function (id) {
      var exist = currentIngredients.find(function (x) { return x.ingredientId === id; });
      next.push({ ingredientId:id, amount: exist ? exist.amount : '' });

  }
  /* 添加食材：打开级联选择器 */

  /* 点击添加阶段 → 底部滑出阶段选择面板 */

  /* 菜名、时间输入即时存草稿 */
  document.querySelector('.main').addEventListener('input', function (e) {
    if (e.target && (e.target.id === 'recipeName' || e.target.id === 'recipeVideo')) { saveDraft(); if (!isEdit) updateWizard(); }
  });

  /* ===== 级联选择器 ===== */
  var pickerCallback = null, pickerSelected = [], activePickerCat = '';
  function openPicker(callback) {
    pickerCallback = callback;

  function renderPickerList(kw) {
    var catsEl = document.getElementById('pickerCats');

    kw = (kw || '').trim().toLowerCase();

    /* 级联模式 */

    cats.forEach(function (cat) {

      el.textContent = cat;

      catsEl.appendChild(el);

    itemsEl.innerHTML = '';
    ingByCat[activePickerCat].forEach(function (it) { addItemEl(itemsEl, it); });
  }
  function addItemEl(parent, it) {
    var sel = pickerSelected.indexOf(it.id) >= 0;
    var el = document.createElement('div');
    el.className = 'pli-item' + (sel ? ' selected' : '');
    el.innerHTML =
      '<div class="plii-icon">' + it.icon + '</div>' +
      '<div class="plii-meta"><div class="plii-name">' + esc(it.name) + '</div><div class="plii-alias">' + esc(it.aliases.join(' · ')) + '</div></div>' +
      '<div class="plii-check">' + (sel ? '✓' : '') + '</div>';
    el.addEventListener('click', function () {
      var idx = pickerSelected.indexOf(it.id);
      if (idx >= 0) pickerSelected.splice(idx, 1);
      else pickerSelected.push(it.id);
      renderPickerList(document.getElementById('pickerSearch').value);
    });
    parent.appendChild(el);
  }
  document.getElementById('pickerSearch').addEventListener('input', function () { renderPickerList(this.value); });
  document.getElementById('pickerConfirm').addEventListener('click', function () {
    if (pickerCallback) pickerCallback(pickerSelected.slice());
    closePicker();
  });
  document.getElementById('pickerCancel').addEventListener('click', closePicker);
  document.getElementById('pickerClose').addEventListener('click', closePicker);

  /* 网页导入 */
  document.getElementById('importBtn').addEventListener('click', function () {
    var url = document.getElementById('importUrl').value.trim();
    if (!url) { showToast('请粘贴食谱链接'); return; }
    /* 保存 URL 为 sourceUrl */
    if (editingId) { var rr = recipes.find(function(x){return x.id===editingId;}); if(rr) rr.sourceUrl = url; }
    /* 自动识别来源 */
    if (/lanfanapp\.com/.test(url)) { selectedSource = '懒饭'; renderSource(); }
    else if (/xiachufang\.com/.test(url)) { selectedSource = '下厨房'; renderSource(); }
    else if (/meishichina\.com/.test(url)) { selectedSource = '美食天下'; renderSource(); }
    /* 模拟导入过渡 */
    var stages = ['正在解析网页...', '提取食材信息...', '解析烹饪步骤...', '整理完成 ✓'];
    var stage = 0;

  /* ===== 步进导航（仅新增模式） ===== */
  var currentStep = 1;
  var totalSteps = 3;
  var isEdit = !!editingId;

  function doSave() {
    var name = recipeName.value.trim();
    if (!name) { showToast('请输入菜谱名称'); return; }
    var ings = currentIngredients.filter(function (x) { return x.ingredientId; }).map(function (x) { return {ingredientId:x.ingredientId, amount:x.amount||'适量'}; });
    if (!ings.length) { showToast('请至少添加一种食材'); return; }
    /* 保留有固定模块或条目的阶段，并保留 modules 字段 */
    var steps = currentSteps.filter(function (ph) {
      return ph && ((ph.entries && ph.entries.length) || (ph.modules && ph.modules.length));
    }).map(function (ph) {
      return { phase: ph.phase, modules: ph.modules || null, entries: ph.entries || [] };
    });
    if (!steps.length) { showToast('请至少添加一个阶段'); return; }
    if (editingId) {
      var r = recipes.find(function (x) { return x.id === editingId; });
      if (r) { r.name=name; r.icon=selectedIcon; r.time=selectedTime; r.difficulty=selectedDifficulty; r.source=selectedSource; r.sourceUrl=r.sourceUrl||''; r.video=document.getElementById('recipeVideo').value; r.ingredients=ings; r.steps=steps; }
      showToast('已更新');
    } else {
      var maxId = recipes.reduce(function(m,x){return Math.max(m,x.id)},0);
      recipes.push({ id:maxId+1, name:name, desc:'', icon:selectedIcon, time:selectedTime, difficulty:selectedDifficulty, source:selectedSource, sourceUrl:'', video:document.getElementById('recipeVideo').value, ingredients:ings, steps:steps });
      showToast('已添加');
    }
    saveRecipes(recipes);
    clearDraft();
    setTimeout(function(){ var ref=document.referrer; location.href=(ref&&ref.indexOf('recipe-view.html')!==-1)?ref:'recipe-manage.html'; }, 600);
  }

  if (isEdit) {
    /* 编辑模式：平铺所有内容 */
    document.querySelector('.main').classList.add('mode-edit');
    document.querySelectorAll('.step').forEach(function (el) { el.classList.add('active'); });
    document.getElementById('delBtn').style.display = 'block';
    document.getElementById('editSaveBtn').addEventListener('click', doSave);
  } else {
    /* 新增模式：步进向导 */
    function updateWizard() {
      document.getElementById('stepFill').style.width = (currentStep / totalSteps * 100) + '%';
      var labels = ['基本信息', '食材', '步骤'];
      document.getElementById('stepLabel').textContent = labels[currentStep - 1] + ' · ' + currentStep + '/' + totalSteps;
      document.querySelectorAll('.step').forEach(function (el) {
        el.classList.toggle('active', +el.dataset.step === currentStep);
      });
      var prev = document.getElementById('prevBtn');
      var next = document.getElementById('nextBtn');
      prev.classList.toggle('hidden', currentStep === 1);
      if (currentStep === totalSteps) {
        next.textContent = '保存';
        next.disabled = false;
      } else {
        next.textContent = '下一步';
        var ok = true;
        if (currentStep === 1) { if (!recipeName.value.trim()) ok = false; }
        if (currentStep === 2) { if (!currentIngredients.filter(function(x){return x.ingredientId;}).length) ok = false; }
        next.disabled = !ok;
      }
    }
    document.getElementById('prevBtn').addEventListener('click', function () {
      if (currentStep > 1) { currentStep--; updateWizard(); }
    });
    document.getElementById('nextBtn').addEventListener('click', function () {
      if (currentStep < totalSteps) { currentStep++; updateWizard(); }
      else doSave();
    });
    /* 食材/步骤变动后更新按钮状态，并刷新步骤卡片（动态选项联动） */
    var _origRenderIngRows = renderIngRows;
    renderIngRows = function () { _origRenderIngRows(); updateWizard(); _origRenderStepRows(); };
    var _origRenderStepRows = renderStepRows;
    renderStepRows = function () { _origRenderStepRows(); updateWizard(); };
    updateWizard();
  }

  /* 删除 */
  delBtn.addEventListener('click', function () {
    if (!editingId) return;
    showConfirm('确定删除此菜谱？\n此操作无法撤销。', function () {
      recipes = recipes.filter(function (x) { return x.id !== editingId; });
      saveRecipes(recipes);
      clearDraft();
      showToast('已删除');
      setTimeout(function(){ var ref=document.referrer; location.href=(ref&&ref.indexOf('recipe-view.html')!==-1)?ref:'recipe-manage.html'; }, 600);
    });
  });
})();
</script>
</body>
</html>
