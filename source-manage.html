<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;family=Source+Serif+Pro:wght@400;600&amp;display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 来源管理</title>
<style>
:root{
  --bg:#fbf7f0;--surface:#fffdf8;--fg:#1f1a16;--fg-2:#4b4038;
  --muted:#7d7168;--accent:#3f7a4e;--danger:#b33a3a;
  --border:#ded3c5;--border-soft:#eee5da;
  --font-display:Georgia,"Times New Roman",serif;
  --font-body:"Source Serif Pro",Georgia,serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --text-base:18px;--text-lg:21px;--text-sm:15px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-pill:9999px;--radius-xl:16px;
  --motion-fast:180ms;--ease-standard:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);background:#e9e2d8;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
}
.device{
  position:relative;width:390px;height:844px;
  background:var(--bg);border-radius:46px;
  box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;display:flex;flex-direction:column;
}
@media(max-width:430px){body{background:var(--bg);}.device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}}
/* topbar */
.topbar{
  flex:0 0 auto;display:flex;align-items:center;
  padding:0 var(--space-6);padding-top:max(env(safe-area-inset-top),16px);height:56px;
  border-bottom:1px solid var(--border);
}
.brand{font-family:var(--font-display);font-size:var(--text-lg);color:var(--fg);letter-spacing:.08em;}
.back-btn{text-decoration:none;color:var(--fg);display:flex;align-items:center;margin-right:10px;}
.back-btn:active{opacity:.5;}
.count{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-left:auto;}

/* main */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 var(--space-6) var(--space-8);}

/* 搜索 */
.search-bar{position:relative;margin:var(--space-4) 0;}
.search-bar input{
  width:100%;font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--fg);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-pill);
  padding:10px 16px;outline:none;
}
.search-bar input:focus{border-color:var(--accent);}

/* 卡片 */
.src-grid{display:flex;flex-direction:column;gap:8px;}
.src-card{
  display:flex;align-items:center;gap:var(--space-4);
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:var(--space-5);
  transition:border-color var(--motion-fast) var(--ease-standard);
}
.src-card:active{border-color:var(--accent);}
.src-icon{
  width:44px;height:44px;border-radius:var(--radius-md);
  background:color-mix(in oklab,var(--accent),transparent 88%);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;
}
.src-meta{flex:1;min-width:0;}
.src-name{font-family:var(--font-display);font-size:var(--text-base);color:var(--fg);letter-spacing:.04em;}
.src-count{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px;}
.src-del{
  font-size:14px;color:var(--muted);background:none;border:none;
  cursor:pointer;flex:0 0 auto;padding:4px;transition:color var(--motion-fast);
}
.src-del:active{color:var(--danger);}

/* 空状态 */
.empty-state{text-align:center;padding:var(--space-8) 0;color:var(--muted);}
.empty-state .empty-icon{font-size:40px;margin-bottom:var(--space-3);}
.empty-state p{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;}

/* 添加 */
.add-section{margin-top:var(--space-4);}
.add-row{display:flex;gap:8px;}
.add-row input{
  flex:1;font-family:var(--font-body);font-size:var(--text-sm);
  color:var(--fg);background:var(--surface);
  border:1px solid var(--border-soft);border-radius:var(--radius-md);
  padding:10px 12px;outline:none;
}
.add-row input:focus{border-color:var(--accent);}
.add-row button{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  color:#fff;background:var(--accent);border:none;
  border-radius:var(--radius-md);padding:10px 18px;cursor:pointer;white-space:nowrap;
}
.add-row button:active{opacity:.85;}

/* toast */
.toast{
  position:absolute;bottom:40px;left:50%;transform:translate(-50%,12px);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;
  background:var(--fg);color:var(--bg);padding:8px 20px;
  border-radius:var(--radius-pill);opacity:0;
  transition:opacity 280ms var(--ease-standard),transform 280ms var(--ease-standard);
  z-index:99;pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
<div class="device">
  <header class="topbar">
    <a class="back-btn" href="recipe-edit.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <span class="brand">来源管理</span>
    <span class="count" id="count"></span>
  </header>

  <main class="main">
    <div class="search-bar"><input id="search" type="text" autocomplete="off" placeholder="搜索来源"></div>
    <div class="src-grid" id="list"></div>
    <div class="add-section">
      <div class="add-row">
        <input id="newName" type="text" autocomplete="off" placeholder="新来源名称（如：香哈网）">
        <button id="addBtn">添加</button>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
</div>
<script>
(function(){
  var KEY = 'yzys_sources';
  var DEFAULTS = [
    {name:'懒饭',icon:'📋'},{name:'下厨房',icon:'🥘'},{name:'美食天下',icon:'🍽️'},
    {name:'香哈网',icon:'🌿'},{name:'豆果美食',icon:'🫘'},{name:'百度百科',icon:'📖'},
    {name:'小红书',icon:'📕'},{name:'抖音',icon:'🎵'},{name:'B站',icon:'📺'},
    {name:'个人创作',icon:'✏️'},{name:'其他',icon:'📄'}
  ];
  function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return[];}}
  function save(arr){try{localStorage.setItem(KEY,JSON.stringify(arr));}catch(e){}}
  if(!load().length) save(DEFAULTS);
  var items = load();
  var list = document.getElementById('list');
  var count = document.getElementById('count');
  var toast = document.getElementById('toast');
  var search = document.getElementById('search');
  var newInput = document.getElementById('newName');
  var icons = ['📋','🥘','🍽️','✏️','📄','🔗','📖','⭐'];

  function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(function(){toast.classList.remove('show')},1800);}

  function render(){
    var q = (search.value||'').toLowerCase();
    var recipes=[];
    try{recipes=JSON.parse(localStorage.getItem('yzys_recipes')||'[]');}catch(e){}
    var filtered = items.filter(function(x){return x.name.toLowerCase().indexOf(q)>=0;});
    list.innerHTML='';
    if(!filtered.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📂</div><p>'+(q?'无匹配来源':'暂无来源，添加一个吧')+'</p></div>';}
    filtered.forEach(function(s,i){
      var idx = items.indexOf(s);
      var card = document.createElement('div');
      card.className='src-card';
      var refCount = recipes.filter(function(r){return r.source===s.name;}).length;
      card.innerHTML=
        '<div class="src-icon">'+(s.icon||'📋')+'</div>'+
        '<div class="src-meta"><div class="src-name">'+s.name.replace(/</g,'&lt;')+'</div><div class="src-count">'+(refCount?refCount+' 个菜谱引用':'暂无引用')+'</div></div>'+
        (refCount?'':'<button class="src-del">✕</button>');
      card.querySelector('.src-del').addEventListener('click',function(e){e.stopPropagation();
        /* 检查是否有菜谱引用 */
        var recipes=[];
        try{recipes=JSON.parse(localStorage.getItem('yzys_recipes')||'[]');}catch(e){}
        if(recipes.some(function(r){return r.source===s.name;})){
          showToast('有菜谱引用此来源，无法删除');return;
        }
        items.splice(idx,1);save(items);render();showToast('已删除');});
      list.appendChild(card);
    });
    count.textContent=items.length+' 个';
  }

  document.getElementById('addBtn').addEventListener('click',function(){
    var v = newInput.value.trim();
    if(!v){showToast('请输入来源名称');return;}
    if(items.some(function(x){return x.name===v;})){showToast('已存在');return;}
    items.push({name:v,icon:icons[Math.floor(Math.random()*icons.length)]});
    save(items);render();newInput.value='';
    showToast('已添加 '+v);
  });
  newInput.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('addBtn').click();});
  search.addEventListener('input',render);

  render();
})();
</script>
</body>
</html>
