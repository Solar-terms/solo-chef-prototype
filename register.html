<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>一作一食 · 注册</title>
<style>
:root{
  --bg:#fbf7f0;
  --surface:#fffdf8;
  --fg:#1f1a16;
  --fg-2:#4b4038;
  --muted:#7d7168;
  --accent:#9a5a2f;
  --accent-on:#ffffff;
  --accent-hover:color-mix(in oklab,var(--accent),black 8%);
  --accent-active:color-mix(in oklab,var(--accent),black 14%);
  --border:#ded3c5;
  --radius-pill:9999px;
  --radius-md:8px;
  --focus-ring:0 0 0 4px color-mix(in oklab,var(--accent),transparent 76%);
  --motion-fast:200ms;
  --motion-base:280ms;
  --ease-standard:cubic-bezier(.22,1,.36,1);
  --field-gap:30px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:#e9e2d8;
  color:var(--fg);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
.device{
  position:relative;
  width:390px;height:844px;
  background:var(--bg);
  border-radius:46px;
  box-shadow:0 30px 80px rgba(31,26,22,.22);
  overflow:hidden;
  display:flex;flex-direction:column;
}
@media (max-width:430px){
  body{background:var(--bg);}
  .device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
}
.register{
  flex:1;
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 56px) 36px calc(env(safe-area-inset-bottom) + 28px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  animation:arrive 1000ms var(--ease-standard) both;
}
@keyframes arrive{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.reg-head{text-align:center;margin-bottom:26px;}
.app-name{
  font-family:var(--font-display);
  font-weight:400;font-size:28px;
  letter-spacing:.2em;text-indent:.2em;
  color:var(--fg);
  margin-bottom:10px;
}
.app-en{
  font-family:var(--font-mono);
  font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--muted);text-indent:.3em;
  margin-bottom:22px;
}
/* 进度条 —— 引导 */
.step-bar{
  width:140px;height:2px;margin:0 auto;
  background:var(--border);border-radius:var(--radius-pill);
  overflow:hidden;
}
.step-fill{
  display:block;height:100%;width:33.33%;
  background:var(--accent);border-radius:var(--radius-pill);
  transition:width var(--motion-base) var(--ease-standard);
}
.step-label{
  margin-top:10px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;
  color:var(--muted);
}
/* 选中「作」竹绿，选中「食」印章红 */
.register.mode-zuo{--accent:#3f7a4e;}
.register.mode-shi{--accent:#b5392f;}
/* 作 / 食 —— 两枚印章，一盖一留白 */
.mode{
  display:flex;align-items:center;justify-content:center;
  gap:40px;
  margin-bottom:22px;
}
.glyph{
  width:74px;height:74px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);
  font-size:28px;line-height:1;
  background:transparent;
  border:1px solid color-mix(in oklab,var(--fg),transparent 84%);
  color:var(--muted);
  cursor:pointer;
  transition:color 520ms var(--ease-standard),
             border-color 520ms var(--ease-standard),
             background-color 520ms var(--ease-standard);
}
.glyph.active{
  color:var(--accent);
  border-color:var(--accent);
  background:color-mix(in oklab,var(--accent),transparent 90%);
}
.glyph:focus-visible{outline:none;box-shadow:var(--focus-ring);}
.mode-desc{
  text-align:center;
  font-family:var(--font-display);
  font-size:16px;letter-spacing:.04em;
  color:var(--muted);
  margin-bottom:8px;
}
/* 分步内容 */
.wizard{display:flex;flex-direction:column;flex:1;min-height:0;}
.step{display:none;}
.step.active{display:block;animation:stepin 360ms var(--ease-standard) both;}
.step.active[data-step="2"]{display:flex;flex-direction:column;gap:var(--field-gap);}
@keyframes stepin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.step-title{
  text-align:center;
  font-family:var(--font-display);
  font-size:20px;letter-spacing:.04em;
  color:var(--fg);
  margin-bottom:28px;
}
/* 表单 —— 仅下划线，无标签 */
.field{position:relative;}
.field input{
  font-family:var(--font-body);
  font-size:18px;
  color:var(--fg);
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border);
  border-radius:0;
  padding:10px 2px;
  width:100%;
  transition:border-color var(--motion-fast) var(--ease-standard),
             box-shadow var(--motion-fast) var(--ease-standard);
}
.field input::placeholder{color:var(--muted);}
.field input:focus{
  outline:none;
  border-bottom-color:var(--accent);
  box-shadow:0 1px 0 0 var(--accent);
}
.code-row{display:flex;align-items:center;gap:14px;}
.code-row input{flex:1;}
.code-btn{
  flex:0 0 auto;
  font-family:var(--font-body);
  font-size:14px;color:var(--muted);
  background:none;border:none;
  white-space:nowrap;cursor:pointer;padding:4px 0;
  transition:color var(--motion-fast) var(--ease-standard);
}
.code-btn:not(:disabled):active{color:var(--accent);}
.code-btn:disabled{color:var(--border);cursor:not-allowed;}
/* 第三步内的两个分步标记 */
.sub-eyebrow{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;
  color:var(--muted);text-align:center;margin-bottom:10px;
}
.sub-eyebrow .sub-no{color:var(--accent);}
.name-fields{display:flex;flex-direction:column;gap:var(--field-gap);}
/* 配对区 */
.pair-block{margin-top:30px;}
.block-q{
  text-align:center;font-family:var(--font-body);
  font-size:15px;letter-spacing:.02em;color:var(--fg-2);
  margin-bottom:16px;
}
.invite-link{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;
  color:var(--muted);text-align:center;
  word-break:break-all;line-height:1.5;margin:0 0 12px;
}
.copy-btn{
  font-family:var(--font-body);font-size:14px;color:var(--muted);
  background:none;border:none;cursor:pointer;padding:4px 0;
  transition:color var(--motion-fast) var(--ease-standard);
}
.copy-btn:active{color:var(--accent);}
.pair-done{
  text-align:center;font-family:var(--font-body);
  font-size:15px;color:var(--accent);margin-top:8px;
}
/* 注册成功反馈页 */
.done{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:0 8px;
  animation:stepin 360ms var(--ease-standard) both;
  display:none;
}
.done.show{display:flex;}
.vanish{display:none!important;}
.done-mark{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:32px;line-height:1;
  color:#cf3a2e;
  border:1px solid #cf3a2e;
  background:color-mix(in oklab,#cf3a2e,transparent 90%);
  margin-bottom:24px;
}
.done-title{
  font-family:var(--font-display);font-size:28px;letter-spacing:.06em;
  color:var(--fg);margin-bottom:14px;
}
.done-desc{
  font-family:var(--font-body);font-size:15px;line-height:1.7;
  color:var(--muted);max-width:260px;margin-bottom:28px;
}
.done-share{width:100%;max-width:300px;margin-bottom:28px;}
.done-link{
  font-family:var(--font-body);font-size:15px;color:var(--accent);
  text-decoration:none;border-bottom:1px solid color-mix(in oklab,var(--accent),transparent 55%);
  padding-bottom:1px;
}
/* 导航 */
.wizard-nav{margin-top:auto;display:flex;gap:12px;padding-top:24px;}
.btn-primary{
  flex:1;
  font-family:var(--font-body);
  font-size:17px;letter-spacing:.4em;text-indent:.4em;
  color:var(--accent-on);
  background:var(--accent);
  border:none;border-radius:var(--radius-md);
  padding:16px;cursor:pointer;
  transition:background var(--motion-fast) var(--ease-standard),
             transform var(--motion-fast) var(--ease-standard);
}
.wizard-nav .btn-primary{margin-top:0;}
.btn-primary:not(:disabled):hover{background:var(--accent-hover);}
.btn-primary:not(:disabled):active{background:var(--accent-active);transform:translateY(1px);}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
.btn-ghost{
  flex:0 0 auto;
  font-family:var(--font-body);font-size:15px;
  color:var(--fg-2);
  background:transparent;border:1px solid var(--border);
  border-radius:var(--radius-md);padding:16px 20px;cursor:pointer;
  transition:color var(--motion-fast) var(--ease-standard),
             border-color var(--motion-fast) var(--ease-standard);
}
.btn-ghost:active{color:var(--accent);border-color:var(--accent);}
.btn-ghost.hidden{display:none;}
.login-entry{
  text-align:center;font-size:14px;color:var(--muted);
  padding-top:20px;
}
.login-entry a{
  color:var(--accent);text-decoration:none;
  border-bottom:1px solid color-mix(in oklab,var(--accent),transparent 55%);
  padding-bottom:1px;
}
.login-entry a:active{color:var(--accent-active);}
.toast{
  position:absolute;
  left:50%;bottom:calc(env(safe-area-inset-bottom) + 44px);
  transform:translate(-50%,12px);
  background:var(--fg);color:var(--bg);
  font-size:13px;padding:10px 18px;border-radius:9999px;
  opacity:0;pointer-events:none;
  transition:opacity var(--motion-fast) var(--ease-standard),
             transform var(--motion-fast) var(--ease-standard);
  z-index:10;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
  <div class="device">
    <main class="register mode-zuo" data-od-id="register-screen">
      <header class="reg-head" id="regHead">
        <h1 class="app-name">一作一食</h1>
        <p class="app-en">solo chef · sole love</p>
        <div class="step-bar"><span class="step-fill" id="stepFill"></span></div>
        <p class="step-label" id="stepLabel">选身份 · 1/3</p>
      </header>

      <form class="wizard" id="regForm" data-od-id="register-form" novalidate>
        <!-- 第一步：身份 -->
        <section class="step active" data-step="1" data-od-id="step-identity">
          <p class="step-title">你是掌勺的，还是被宠的？</p>
          <div class="mode" data-od-id="mode-switch" role="tablist" aria-label="身份切换">
            <button class="glyph active" id="segZuo" type="button" role="tab" aria-selected="true" data-mode="zuo">作</button>
            <button class="glyph" id="segShi" type="button" role="tab" aria-selected="false" data-mode="shi">食</button>
          </div>
          <p class="mode-desc" id="modeDesc">做饭给喜欢的人吃</p>
        </section>

        <!-- 第二步：手机号 -->
        <section class="step" data-step="2" data-od-id="step-phone">
          <p class="step-title">验证手机号</p>
          <div class="field">
            <input id="phone" type="tel" inputmode="numeric" autocomplete="tel"
                   maxlength="11" placeholder="手机号">
          </div>
          <div class="field">
            <div class="code-row">
              <input id="code" type="tel" inputmode="numeric" autocomplete="one-time-code"
                     maxlength="6" placeholder="验证码">
              <button type="button" class="code-btn" id="codeBtn">获取验证码</button>
            </div>
          </div>
        </section>

        <!-- 第三步：昵称 + 成一对 -->
        <section class="step" data-step="3" data-od-id="step-nickname">
          <p class="step-title">补全你们俩的信息</p>

          <p class="sub-eyebrow"><span class="sub-no">①</span> 称呼</p>
          <p class="block-q">你们之间，怎么称呼？</p>
          <div class="name-fields">
            <div class="field">
              <input id="callMe" type="text" autocomplete="off" placeholder="ta 怎么称呼你">
            </div>
            <div class="field">
              <input id="callTa" type="text" autocomplete="off" placeholder="你怎么称呼 ta">
            </div>
          </div>

          <div class="pair-block" data-od-id="pair-block">
            <p class="sub-eyebrow"><span class="sub-no">②</span> 成一对</p>
            <p class="block-q" id="pairQ">留个 ta 的手机号，注册后把专属链接发给 ta</p>

            <div class="field" id="partnerField">
              <input id="partnerPhone" type="tel" inputmode="numeric" autocomplete="tel" maxlength="11" placeholder="对方手机号">
            </div>

            <p class="pair-done" id="pairDone" hidden></p>
          </div>
        </section>

        <div class="wizard-nav">
          <button type="button" class="btn-ghost hidden" id="backBtn">上一步</button>
          <button type="button" class="btn-primary" id="nextBtn">下一步</button>
        </div>
      </form>

      <p class="login-entry" id="loginEntry" data-od-id="login-entry">已有账号？<a href="login.html">登录</a></p>

      <section class="done" id="doneScreen">
        <div class="done-mark">囍</div>
        <h2 class="done-title">已成一对</h2>
        <p class="done-desc" id="doneDesc"></p>
        <div class="done-share" id="doneShare">
          <p class="invite-link" id="doneLink"></p>
          <button type="button" class="copy-btn" id="doneCopy">复制分享</button>
        </div>
        <a class="done-link" href="login.html">进入一作一食</a>
      </section>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>
  </div>
<script>
  (function () {
    var TEXT = {
      zuo: '做饭给喜欢的人吃',
      shi: '吃喜欢的人做的饭'
    };
    var segZuo = document.getElementById('segZuo');
    var segShi = document.getElementById('segShi');
    var modeDesc = document.getElementById('modeDesc');
    var phone = document.getElementById('phone');
    var code = document.getElementById('code');
    var codeBtn = document.getElementById('codeBtn');
    var callMe = document.getElementById('callMe');
    var callTa = document.getElementById('callTa');
    var partnerPhone = document.getElementById('partnerPhone');
    var partnerField = document.getElementById('partnerField');
    var pairQ = document.getElementById('pairQ');
    var pairDone = document.getElementById('pairDone');
    var nextBtn = document.getElementById('nextBtn');
    var backBtn = document.getElementById('backBtn');
    var stepFill = document.getElementById('stepFill');
    var stepLabel = document.getElementById('stepLabel');
    var toast = document.getElementById('toast');
    var regRoot = document.querySelector('.register');

    var regHead = document.getElementById('regHead');
    var loginEntry = document.getElementById('loginEntry');
    var doneScreen = document.getElementById('doneScreen');
    var doneDesc = document.getElementById('doneDesc');
    var doneShare = document.getElementById('doneShare');
    var doneCopy = document.getElementById('doneCopy');
    var doneLinkEl = document.getElementById('doneLink');

    var isInvitee = false;

    var current = 'zuo';
    var step = 1;

    var steps = [
      { label: '选身份', gate: function () { return true; } },
      { label: '验证手机', gate: function () { return validPhone(phone.value) && code.value.trim().length >= 4; } },
      { label: '取名并成一对', gate: function () {
          var namesOk = callMe.value.trim().length > 0 && callTa.value.trim().length > 0;
          if (isInvitee) return namesOk;
          return namesOk && validPhone(partnerPhone.value);
        } }
    ];

    function genCode() {
      var s = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      var r = '';
      for (var i = 0; i < 4; i++) r += s[Math.floor(Math.random() * s.length)];
      return 'YZ·' + r;
    }
    function formatCode(p) {
      p = (p || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (p.indexOf('YZ') === 0) p = p.slice(2);
      return 'YZ·' + p;
    }
    var inviteCode = genCode();
    var inviteParam = inviteCode.replace('·', '');
    var inviteLink = location.href.split('?')[0] + '?invite=' + inviteParam;
    var inviteMsg = '邀请你一起用《一作一食》—— 点开链接注册，我们就是一对：' + inviteLink;
    var inviteLinkEl = document.getElementById('doneLink');
    if (inviteLinkEl) inviteLinkEl.textContent = inviteLink;

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(function () { toast.classList.remove('show'); }, 2200);
    }

    function setMode(mode) {
      if (!TEXT[mode]) return;
      current = mode;
      modeDesc.textContent = TEXT[mode];
      var zuoActive = mode === 'zuo';
      segZuo.classList.toggle('active', zuoActive);
      segShi.classList.toggle('active', !zuoActive);
      segZuo.setAttribute('aria-selected', String(zuoActive));
      segShi.setAttribute('aria-selected', String(!zuoActive));
      regRoot.classList.remove('mode-zuo', 'mode-shi');
      regRoot.classList.add('mode-' + mode);
      try { localStorage.setItem('yzys_mode', mode); } catch (e) {}
    }

    /* 配对改为：邀请方输入对方手机号 → 生成链接；受邀方经链接自动关联 */

    function validPhone(v) { return /^1\d{10}$/.test(v.trim()); }

    function updateNav() {
      var s = steps[step - 1];
      stepFill.style.width = (step / 3 * 100) + '%';
      stepLabel.textContent = s.label + ' · ' + step + '/3';
      backBtn.classList.toggle('hidden', step === 1);
      nextBtn.classList.remove('hidden');
      nextBtn.textContent = step === 3 ? '注册并成一对' : '下一步';
      nextBtn.disabled = !s.gate();
    }

    function showStep(n) {
      step = n;
      document.querySelectorAll('.step').forEach(function (el) {
        el.classList.toggle('active', +el.dataset.step === n);
      });
      updateNav();
    }

    function doRegister() {
      if (!steps[2].gate()) { showToast('请先完成这一步'); return; }
      if (isInvitee) {
        doneDesc.textContent = '已与 ta 配对，去给 ta 做顿饭吧。';
        doneShare.classList.add('vanish');
      } else {
        var baseUrl = location.href.split('?')[0];
        inviteLink = baseUrl + '?invite=' + inviteParam + '&callMe=' + encodeURIComponent(callMe.value.trim()) + '&callTa=' + encodeURIComponent(callTa.value.trim());
        inviteMsg = '邀请你一起用《一作一食》—— 点开链接，我们就是一对：' + inviteLink;
        doneLinkEl.textContent = inviteLink;
        doneDesc.textContent = '把这条链接发给 ta，ta 注册完成，你们就正式成对。';
        doneShare.classList.remove('vanish');
      }
      regHead.classList.add('vanish');
      document.getElementById('regForm').classList.add('vanish');
      loginEntry.classList.add('vanish');
      doneScreen.classList.add('show');
    }

    segZuo.addEventListener('click', function () { setMode('zuo'); });
    segShi.addEventListener('click', function () { setMode('shi'); });

    phone.addEventListener('input', function () { this.value = this.value.replace(/\D/g, ''); updateNav(); });
    code.addEventListener('input', function () { this.value = this.value.replace(/\D/g, ''); updateNav(); });
    callMe.addEventListener('input', updateNav);
    callTa.addEventListener('input', updateNav);
    partnerPhone.addEventListener('input', function () { this.value = this.value.replace(/\D/g, ''); updateNav(); });

    codeBtn.addEventListener('click', function () {
      if (!validPhone(phone.value)) { showToast('请输入正确的手机号'); return; }
      var left = 60;
      codeBtn.dataset.counting = '1';
      codeBtn.disabled = true;
      codeBtn.textContent = left + 's';
      showToast('验证码已发送');
      var timer = setInterval(function () {
        left--;
        if (left <= 0) {
          clearInterval(timer);
          codeBtn.dataset.counting = '';
          codeBtn.textContent = '获取验证码';
          updateNav();
        } else {
          codeBtn.textContent = left + 's';
        }
      }, 1000);
    });

    doneCopy.addEventListener('click', function () {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(inviteMsg).then(
          function () { showToast('邀请已复制'); },
          function () { showToast(inviteMsg); }
        );
      } else {
        showToast(inviteMsg);
      }
    });

    nextBtn.addEventListener('click', function () {
      if (nextBtn.disabled) return;
      if (step < 3) showStep(step + 1);
      else doRegister();
    });
    backBtn.addEventListener('click', function () { if (step > 1) showStep(step - 1); });

    try { var saved = localStorage.getItem('yzys_mode'); if (saved && TEXT[saved]) setMode(saved); } catch (e) {}

    /* 受邀者点开带 invite 的链接：自动关联，无需手动输码 */
    try {
      var q = new URLSearchParams(location.search);
      var incoming = q.get('invite');
      if (incoming) {
        isInvitee = true;
        var iCode = formatCode(incoming);
        partnerField.hidden = true;
        pairQ.textContent = '已通过 ta 的邀请关联';
        pairDone.textContent = '邀请码 ' + iCode;
        pairDone.hidden = false;
        /* 互填小名：A 的 callMe(ta怎么称呼A) → B 的 callTa(你怎么称呼ta) */
        var invCallMe = (q.get('callMe') || '').trim();
        var invCallTa = (q.get('callTa') || '').trim();
        if (invCallTa) { callMe.value = invCallTa; }
        if (invCallMe) { callTa.value = invCallMe; }
        updateNav();
        showToast('已通过邀请关联 · ' + iCode);
      }
    } catch (e) {}

    showStep(1);
  })();
</script>
</body>
</html>
